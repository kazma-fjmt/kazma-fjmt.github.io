<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>シンプルお絵かきアプリ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>🎨 お絵かきアプリ</h1>
  <div id="toolbar">
    <label>色: <input type="color" id="colorPicker" value="#000000"></label>
    <label>太さ: <input type="range" id="sizePicker" min="1" max="20" value="3"></label>
    <button id="clearBtn">クリア</button>
  </div>
  <canvas id="canvas"></canvas>
  <script src="script.js"></script>
</body>
</html>
