<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>不等式の基本性質</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" integrity="sha384-nB0miv6/jRmo5UMMR1wu3Gz6NLsoTkbqJghGIsx//Rlm+ZU03BU6SQNC66uf4l5+" crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" integrity="sha384-7zkQWkzuo3B5mTepMUcHkMB5jZaolc2xDwL6VFqjFALcbeS9Ggm/Yr2r3Dy4lfFg" crossorigin="anonymous"></script>
<style>
  :root {
    --bg: #fafafa; --fg: #333; --muted: #888; --accent: #2a6df4;
    --c1: #d9534f; --c2: #2a6df4; --c3: #27ae60; --c4: #e67e22;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic", sans-serif;
    background: var(--bg); color: var(--fg); line-height: 1.7; -webkit-text-size-adjust: 100%;
  }
  main { max-width: 800px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }
  h1 { font-size: 1.5rem; margin: 0 0 .25rem; }
  .subtitle { color: var(--muted); font-size: .9rem; margin: 0 0 1.5rem; }
  h2 { font-size: 1.15rem; margin: 2.25rem 0 .75rem; border-left: 4px solid var(--accent); padding-left: .6rem; }
  p { margin: .75rem 0; }

  .cards { display: grid; gap: .75rem; margin: 1rem 0; }
  .card {
    background: #fff; border: 2px solid #e3e3e3; border-radius: 12px;
    padding: 1.1rem 1.25rem; cursor: pointer; user-select: none;
    min-height: 56px; transition: all .3s ease;
    opacity: 0; transform: translateY(20px);
  }
  .card.visible { opacity: 1; transform: translateY(0); }
  .card.expanded { border-color: var(--accent); background: #f0f5ff; }
  .card-header { display: flex; align-items: center; gap: .75rem; }
  .card-num {
    width: 2rem; height: 2rem; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: .9rem; color: #fff; flex-shrink: 0;
  }
  .card-title { font-weight: 600; font-size: .95rem; }
  .card-formula {
    margin-top: .75rem; padding-top: .75rem; border-top: 1px dashed #ddd;
    text-align: center; overflow-x: auto;
  }
  .card-formula .katex { font-size: 1.3rem; }
  .card-desc {
    margin-top: .5rem; font-size: .85rem; color: var(--muted);
    max-height: 0; overflow: hidden; transition: max-height .3s ease;
  }
  .card.expanded .card-desc { max-height: 200px; }

  .proof-section {
    background: #fff; border: 1px solid #e3e3e3; border-radius: 10px;
    padding: 1rem 1.25rem; margin: 1rem 0;
  }
  .proof-section .katex { font-size: 1.15rem; }

  .walkthrough {
    background: #fff; border: 1px solid #e3e3e3; border-radius: 10px;
    padding: .75rem 1.25rem; margin: 0 0 .75rem; min-height: 7rem; overflow-x: auto;
  }
  .step {
    padding: .75rem .25rem; border-bottom: 1px dashed #eee;
    opacity: 0; animation: fadeIn .4s ease forwards;
  }
  .step:last-child { border-bottom: none; }
  .step.current { background: #f0f5ff; border-radius: 8px; padding: .75rem; margin: .25rem -.5rem; border-bottom: none; }
  .step .label { color: var(--muted); font-size: .8rem; margin-bottom: .25rem; }
  .step .formula-line { text-align: left; overflow-x: auto; }
  .step .formula-line .katex { font-size: 1.2rem; }
  .step.current .formula-line .katex { font-size: 1.3rem; }

  .controls-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: .75rem; margin: 1rem 0 0;
  }
  .btn {
    appearance: none; border: 1px solid #d4dbeb; background: #fff;
    color: var(--accent); font-size: 1rem; font-weight: 600;
    padding: .85rem 1.2rem; border-radius: 10px; cursor: pointer;
    min-height: 48px; min-width: 110px; font-family: inherit; user-select: none;
  }
  .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn:disabled { opacity: .3; cursor: not-allowed; }
  .btn:active:not(:disabled) { transform: scale(.97); }
  .step-counter { color: var(--muted); font-size: .9rem; text-align: center; flex: 1; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.03); } }
</style>
</head>
<body>
<main>
  <h1>不等式の基本性質</h1>
  <p class="subtitle">不等式の証明で使う4つの基本性質を確認し、例2の証明を見てみましょう。</p>

  <h2>不等式の4つの性質</h2>
  <p class="subtitle">カードをタップすると説明が開きます。</p>
  <div class="cards" id="cards"></div>

  <h2>例2：性質2を使った証明</h2>
  <div class="proof-section" id="problem-statement"></div>

  <p class="subtitle">「次へ」をタップして、証明を追いましょう。</p>
  <div class="walkthrough" id="walkthrough"></div>
  <div class="controls-row">
    <button class="btn" id="prev">← 戻る</button>
    <div class="step-counter">ステップ <span id="step-cur"></span> / <span id="step-tot"></span></div>
    <button class="btn primary" id="next">次へ →</button>
  </div>
</main>

<script>
  function tex(latex, target, displayMode = false) {
    katex.render(latex, target, { throwOnError: false, displayMode });
  }
  function T(l) {
    return katex.renderToString(l, { throwOnError: false, displayMode: false });
  }

  const properties = [
    {
      num: 1, color: "var(--c1)", title: "推移律（すいいりつ）",
      formula: `a > b, \\quad b > c \\implies a > c`,
      desc: "大小関係は「つながる」。a が b より大きく、b が c より大きいなら、a は c より大きい。"
    },
    {
      num: 2, color: "var(--c2)", title: "両辺に加減",
      formula: `a > b \\implies a + c > b + c, \\quad a - c > b - c`,
      desc: "不等式の両辺に同じ数を足しても引いても、大小関係は変わらない。"
    },
    {
      num: 3, color: "var(--c3)", title: "正の数を掛ける・割る",
      formula: `a > b, \\; c > 0 \\implies ac > bc, \\; \\frac{a}{c} > \\frac{b}{c}`,
      desc: "正の数を掛けたり割ったりしても、不等号の向きは変わらない。"
    },
    {
      num: 4, color: "var(--c4)", title: "負の数を掛ける・割る",
      formula: `a > b, \\; c < 0 \\implies ac < bc, \\; \\frac{a}{c} < \\frac{b}{c}`,
      desc: "負の数を掛けたり割ったりすると、不等号の向きが逆になる。"
    }
  ];

  const proofSteps = [
    {
      title: "証明する内容",
      tex: `a > b \\iff a - b > 0`
    },
    {
      title: "\\(\\Longrightarrow\\) の証明：前提",
      tex: `a > b \\text{ が成り立つとする}`
    },
    {
      title: "性質2を使う：両辺から b を引く",
      tex: `a - b > b - b`
    },
    {
      title: "右辺を整理する",
      tex: `a - b > 0`
    },
    {
      title: "\\(\\Longleftarrow\\) の証明：前提",
      tex: `a - b > 0 \\text{ が成り立つとする}`
    },
    {
      title: "性質2を使う：両辺に b を加える",
      tex: `(a - b) + b > 0 + b`
    },
    {
      title: "両辺を整理する",
      tex: `a > b`
    },
    {
      title: "結論",
      tex: `\\therefore \\quad a > b \\iff a - b > 0`
    }
  ];

  let curStep = 0;
  let expandedCard = -1;

  function renderCards() {
    const container = document.getElementById('cards');
    container.innerHTML = '';
    properties.forEach((p, i) => {
      const card = document.createElement('div');
      card.className = 'card' + (expandedCard === i ? ' expanded' : '');
      card.innerHTML = `
        <div class="card-header">
          <div class="card-num" style="background:${p.color}">${p.num}</div>
          <div class="card-title">${p.title}</div>
        </div>
        <div class="card-formula" id="card-formula-${i}"></div>
        <div class="card-desc">${p.desc}</div>
      `;
      card.addEventListener('click', () => {
        expandedCard = expandedCard === i ? -1 : i;
        renderCards();
      });
      container.appendChild(card);
      tex(p.formula, document.getElementById(`card-formula-${i}`));
      setTimeout(() => card.classList.add('visible'), 80 * i);
    });
  }

  function renderWalkthrough() {
    const root = document.getElementById('walkthrough');
    let html = '';
    for (let i = 0; i <= curStep; i++) {
      const s = proofSteps[i];
      const isCurrent = i === curStep;
      html += `<div class="step ${isCurrent ? 'current' : ''}">
        <div class="label">${s.title}</div>
        <div class="formula-line">${T(s.tex)}</div>
      </div>`;
    }
    root.innerHTML = html;
    tex(String(curStep + 1), document.getElementById('step-cur'));
    tex(String(proofSteps.length), document.getElementById('step-tot'));
    document.getElementById('prev').disabled = curStep === 0;
    document.getElementById('next').disabled = curStep === proofSteps.length - 1;
  }

  function init() {
    renderCards();
    tex(`a > b \\iff a - b > 0 \\text{　を性質2を用いて証明する}`, document.getElementById('problem-statement'));

    document.getElementById('prev').addEventListener('click', () => {
      if (curStep > 0) { curStep--; renderWalkthrough(); }
    });
    document.getElementById('next').addEventListener('click', () => {
      if (curStep < proofSteps.length - 1) { curStep++; renderWalkthrough(); }
    });

    renderWalkthrough();
  }

  if (window.katex) init();
  else window.addEventListener("DOMContentLoaded", () => {
    if (window.katex) init();
    else { const w = setInterval(() => { if (window.katex) { clearInterval(w); init(); } }, 30); }
  });
</script>
</body>
</html>
