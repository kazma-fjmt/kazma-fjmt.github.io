<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>実数解の符号条件</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" integrity="sha384-nB0miv6/jRmo5UMMR1wu3Gz6NLsoTkbqJghGIsx//Rlm+ZU03BU6SQNC66uf4l5+" crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" integrity="sha384-7zkQWkzuo3B5mTepMUcHkMB5jZaolc2xDwL6VFqjFALcbeS9Ggm/Yr2r3Dy4lfFg" crossorigin="anonymous"></script>
<style>
  :root { --bg:#fafafa; --fg:#333; --muted:#888; --accent:#2a6df4; }
  * { box-sizing:border-box; }
  html,body { margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Yu Gothic",sans-serif;background:var(--bg);color:var(--fg);line-height:1.7;-webkit-text-size-adjust:100%; }
  main { max-width:800px;margin:0 auto;padding:2.5rem 1.5rem 4rem; }
  h1 { font-size:1.5rem;margin:0 0 .25rem; }
  .subtitle { color:var(--muted);font-size:.9rem;margin:0 0 1.5rem; }
  h2 { font-size:1.1rem;margin:2.25rem 0 .75rem;border-left:4px solid var(--accent);padding-left:.6rem; }
  .card { background:#fff;border:1px solid #e3e3e3;border-radius:10px;padding:1rem 1.25rem;margin:0 0 1rem; }
  /* sign condition rows */
  .cond-row { display:grid;grid-template-columns:2fr 3fr 3fr;gap:.75rem;align-items:center;padding:.75rem;border-radius:8px;margin:.5rem 0;opacity:0;transform:translateY(8px);transition:opacity .4s,transform .4s; }
  .cond-row.show { opacity:1;transform:translateY(0); }
  .cond-row.row-pos { background:#e8fdf0; }
  .cond-row.row-neg { background:#fde8e8; }
  .cond-row.row-diff { background:#fff7e6; }
  .cond-row .rc-title { font-weight:700;font-size:.9rem; }
  .cond-row .rc-numline { font-size:.82rem;color:#555;font-family:monospace; }
  .cond-row .rc-conds { font-size:.82rem; }
  .cond-header { display:grid;grid-template-columns:2fr 3fr 3fr;gap:.75rem;padding:.4rem .75rem;color:var(--muted);font-size:.78rem;font-weight:600;border-bottom:1px solid #e3e3e3;margin-bottom:.25rem; }
  @media(max-width:500px){
    .cond-header,.cond-row { grid-template-columns:1fr; }
  }
  .controls-row2 { display:flex;align-items:center;justify-content:center;gap:.75rem;margin:1rem 0; }
  .btn { appearance:none;border:1px solid #d4dbeb;background:#fff;color:var(--accent);font-size:1rem;font-weight:600;padding:.85rem 1.2rem;border-radius:10px;cursor:pointer;min-height:48px;min-width:100px;font-family:inherit;user-select:none; }
  .btn.primary { background:var(--accent);color:#fff;border-color:var(--accent); }
  .btn:disabled { opacity:.3;cursor:not-allowed; }
  .btn:active:not(:disabled) { transform:scale(.97); }
  /* walkthrough */
  .walkthrough { background:#fff;border:1px solid #e3e3e3;border-radius:10px;padding:.75rem 1.25rem;margin:0 0 .75rem;min-height:9rem;overflow-x:auto; }
  .step { padding:.75rem .25rem;border-bottom:1px dashed #eee; }
  .step:last-child { border-bottom:none; }
  .step.current { background:#f0f5ff;border-radius:8px;padding:.75rem;margin:.25rem -.5rem;animation:stepIn .3s ease-out; }
  @keyframes stepIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .step.current.result-step { animation:stepIn .3s ease-out,pulse .9s ease-out .35s both; }
  @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(42,109,244,.45)} 70%{box-shadow:0 0 0 14px rgba(42,109,244,0)} 100%{box-shadow:0 0 0 0 rgba(42,109,244,0)} }
  .step .label { color:var(--muted);font-size:.8rem;margin-bottom:.2rem; }
  .step .formula-line { overflow-x:auto; }
  .step .formula-line .katex { font-size:1.15rem; }
  .step.current .formula-line .katex { font-size:1.28rem; }
  .controls-row { display:flex;align-items:center;justify-content:space-between;gap:.75rem;margin:1rem 0 0; }
  .step-counter { color:var(--muted);font-size:.9rem;text-align:center;flex:1; }
  .reveal-counter { color:var(--muted);font-size:.85rem;text-align:center;margin:.5rem 0; }
</style>
</head>
<body>
<main>
  <h1>実数解の符号条件</h1>
  <p class="subtitle" id="sub1"></p>

  <h2>3つの符号パターン（タップで順に表示）</h2>
  <div class="cond-header">
    <div>解の符号</div>
    <div>数直線イメージ</div>
    <div>必要条件</div>
  </div>
  <div class="cond-row row-pos" id="row1">
    <div class="rc-title" id="r1-title"></div>
    <div class="rc-numline">─────●──●───<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span id="nl1-0"></span>&nbsp;<span id="nl1-a"></span>&nbsp;&nbsp;<span id="nl1-b"></span></div>
    <div class="rc-conds" id="r1-conds"></div>
  </div>
  <div class="cond-row row-neg" id="row2">
    <div class="rc-title" id="r2-title"></div>
    <div class="rc-numline">───●──●──────<br>&nbsp;&nbsp;&nbsp;&nbsp;<span id="nl2-a"></span>&nbsp;&nbsp;<span id="nl2-b"></span>&nbsp;&nbsp;<span id="nl2-0"></span></div>
    <div class="rc-conds" id="r2-conds"></div>
  </div>
  <div class="cond-row row-diff" id="row3">
    <div class="rc-title" id="r3-title"></div>
    <div class="rc-numline">───●───────●─<br>&nbsp;&nbsp;&nbsp;&nbsp;<span id="nl3-a"></span>&nbsp;&nbsp;&nbsp;&nbsp;<span id="nl3-0"></span>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span id="nl3-b"></span></div>
    <div class="rc-conds" id="r3-conds"></div>
  </div>
  <div class="controls-row2">
    <button class="btn primary" id="reveal-btn" onclick="revealNext()">次の条件を表示</button>
  </div>
  <div class="reveal-counter" id="reveal-count"></div>

  <h2>例題：<span id="ex-eq"></span></h2>
  <div class="walkthrough" id="walkthrough"></div>
  <div class="controls-row">
    <button class="btn" id="prev">◀ 前へ</button>
    <div class="step-counter">ステップ <span id="step-cur"></span> / <span id="step-tot"></span></div>
    <button class="btn primary" id="next">次へ ▶</button>
  </div>
</main>
<script>
  const T=l=>katex.renderToString(l,{throwOnError:false});
  const tex=(l,el)=>katex.render(l,el,{throwOnError:false});
  let steps=[], cur=0;
  let revealed=0;

  function revealNext(){
    revealed++;
    if(revealed>=1) document.getElementById('row1').classList.add('show');
    if(revealed>=2) document.getElementById('row2').classList.add('show');
    if(revealed>=3){ document.getElementById('row3').classList.add('show'); document.getElementById('reveal-btn').disabled=true; }
    document.getElementById('reveal-count').textContent = revealed + ' / 3 パターン表示中';
  }

  function render(){
    const root=document.getElementById('walkthrough');
    let html='';
    for(let i=0;i<=cur;i++){
      const s=steps[i];
      const isCur=i===cur, isRes=s.type==='result';
      html+=`<div class="step${isCur?' current':''}${isCur&&isRes?' result-step':''}">
        <div class="label">${s.title}</div>
        <div class="formula-line">${T(s.formula)}</div>
      </div>`;
    }
    root.innerHTML=html;
    document.getElementById('step-cur').textContent=String(cur+1);
    document.getElementById('step-tot').textContent=String(steps.length);
    document.getElementById('prev').disabled=cur===0;
    document.getElementById('next').disabled=cur===steps.length-1;
    root.lastElementChild?.scrollIntoView({block:'nearest',behavior:'smooth'});
  }

  function init(){
    // Subtitle
    document.getElementById('sub1').innerHTML = T('D') + '，' + T('\\alpha+\\beta') + '，' + T('\\alpha\\beta') + ' の符号の組み合わせで解の符号が決まる';
    // Number-line labels
    document.getElementById('nl1-0').innerHTML = T('0');
    document.getElementById('nl1-a').innerHTML = T('\\alpha');
    document.getElementById('nl1-b').innerHTML = T('\\beta');
    document.getElementById('nl2-a').innerHTML = T('\\alpha');
    document.getElementById('nl2-b').innerHTML = T('\\beta');
    document.getElementById('nl2-0').innerHTML = T('0');
    document.getElementById('nl3-a').innerHTML = T('\\alpha');
    document.getElementById('nl3-0').innerHTML = T('0');
    document.getElementById('nl3-b').innerHTML = T('\\beta');
    // Table cells
    document.getElementById('r1-title').innerHTML = T('\\alpha>0,\\;\\beta>0');
    document.getElementById('r1-conds').innerHTML = T('D\\geq0,\\;\\alpha+\\beta>0,\\;\\alpha\\beta>0');
    document.getElementById('r2-title').innerHTML = T('\\alpha<0,\\;\\beta<0');
    document.getElementById('r2-conds').innerHTML = T('D\\geq0,\\;\\alpha+\\beta<0,\\;\\alpha\\beta>0');
    document.getElementById('r3-title').innerHTML = T('\\alpha\\beta < 0\\text{（異符号）}');
    document.getElementById('r3-conds').innerHTML = T('\\alpha\\beta<0 \\Rightarrow D>0 \\text{ 自動的に成立}');
    document.getElementById('reveal-count').textContent = '0 / 3 パターン表示中';

    tex('x^2-kx-k+3=0', document.getElementById('ex-eq'));

    // example: find k so that both roots are positive
    // α+β=k, αβ=-k+3
    // D = k²-4(-k+3) = k²+4k-12 = (k+6)(k-2)
    // both positive: D>=0 AND α+β>0 AND αβ>0
    // D>=0: k<=-6 or k>=2
    // α+β=k>0: k>0
    // αβ=-k+3>0: k<3
    // Intersection: 2<=k<3
    steps=[
      {title:'例題：両解とも正の条件を求める', formula:'x^2-kx+(-k+3)=0 \\text{（両解正の条件）}', type:'def'},
      {title:'係数から和・積を確認', formula:'\\alpha+\\beta=k,\\quad \\alpha\\beta=-k+3', type:'def'},
      {title:'判別式', formula:'D=k^2-4(-k+3)=k^2+4k-12=(k+6)(k-2)', type:'def'},
      {title:'条件①：D ≥ 0', formula:'(k+6)(k-2)\\geq0 \\Rightarrow k\\leq-6 \\text{ または } k\\geq2', type:'def'},
      {title:'条件②：α+β > 0', formula:'k>0', type:'def'},
      {title:'条件③：αβ > 0', formula:'-k+3>0 \\Rightarrow k<3', type:'def'},
      {title:'3条件の積集合', formula:'k\\leq-6\\text{ or }k\\geq2 \\text{ かつ } k>0 \\text{ かつ } k<3', type:'def'},
      {title:'答え', formula:'2\\leq k<3', type:'result'},
    ];

    document.getElementById('prev').addEventListener('click',()=>{if(cur>0){cur--;render();}});
    document.getElementById('next').addEventListener('click',()=>{if(cur<steps.length-1){cur++;render();}});
    render();
  }

  if(window.katex) init();
  else document.addEventListener('DOMContentLoaded',()=>{
    if(window.katex) init();
    else { const w=setInterval(()=>{if(window.katex){clearInterval(w);init();}},30); }
  });
</script>
</body>
</html>
