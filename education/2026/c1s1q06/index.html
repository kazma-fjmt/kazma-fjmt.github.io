<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>高次式の因数分解</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" integrity="sha384-nB0miv6/jRmo5UMMR1wu3Gz6NLsoTkbqJghGIsx//Rlm+ZU03BU6SQNC66uf4l5+" crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" integrity="sha384-7zkQWkzuo3B5mTepMUcHkMB5jZaolc2xDwL6VFqjFALcbeS9Ggm/Yr2r3Dy4lfFg" crossorigin="anonymous"></script>
<style>
  :root { --bg:#fafafa; --fg:#333; --muted:#888; --accent:#2a6df4; }
  * { box-sizing:border-box; }
  html,body { margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Yu Gothic",sans-serif;background:var(--bg);color:var(--fg);line-height:1.7;-webkit-text-size-adjust:100%; }
  main { max-width:800px;margin:0 auto;padding:2.5rem 1.5rem 4rem; }
  h1 { font-size:1.5rem;margin:0 0 .25rem; }
  .subtitle { color:var(--muted);font-size:.9rem;margin:0 0 1.5rem; }
  h2 { font-size:1.1rem;margin:2.25rem 0 .75rem;border-left:4px solid var(--accent);padding-left:.6rem; }
  .ref-box { background:#fff;border:1px solid #e3e3e3;border-radius:10px;padding:.75rem 1.25rem;display:grid;gap:.5rem;margin-bottom:1.5rem;overflow-x:auto; }
  .ref-row { text-align:center; }
  .ref-row .katex { font-size:1.1rem; }
  .walkthrough { background:#fff;border:1px solid #e3e3e3;border-radius:10px;padding:.75rem 1.25rem;margin:0 0 .75rem;min-height:9rem;overflow-x:auto; }
  .step { padding:.75rem .25rem;border-bottom:1px dashed #eee; }
  .step:last-child { border-bottom:none; }
  .step.current { background:#f0f5ff;border-radius:8px;padding:.75rem;margin:.25rem -.5rem;animation:stepIn .3s ease-out; }
  @keyframes stepIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .step.current.result-step { animation:stepIn .3s ease-out,pulse .9s ease-out .35s both; }
  @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(42,109,244,.45)} 70%{box-shadow:0 0 0 14px rgba(42,109,244,0)} 100%{box-shadow:0 0 0 0 rgba(42,109,244,0)} }
  .step .label { color:var(--muted);font-size:.8rem;margin-bottom:.2rem; }
  .step .tag {
    display:inline-block;background:var(--accent);color:#fff;font-size:.7rem;font-weight:700;
    padding:.1rem .45rem;border-radius:4px;margin-bottom:.35rem;letter-spacing:.03em;
  }
  .step .formula-line { overflow-x:auto; }
  .step .formula-line .katex { font-size:1.2rem; }
  .step.current .formula-line .katex { font-size:1.35rem; }
  .controls-row { display:flex;align-items:center;justify-content:space-between;gap:.75rem;margin:1rem 0 0; }
  .btn { appearance:none;border:1px solid #d4dbeb;background:#fff;color:var(--accent);font-size:1rem;font-weight:600;padding:.85rem 1.2rem;border-radius:10px;cursor:pointer;min-height:48px;min-width:100px;font-family:inherit;user-select:none; }
  .btn.primary { background:var(--accent);color:#fff;border-color:var(--accent); }
  .btn:disabled { opacity:.3;cursor:not-allowed; }
  .btn:active:not(:disabled) { transform:scale(.97); }
  .step-counter { color:var(--muted);font-size:.9rem;text-align:center;flex:1; }
  .step-counter .katex { font-size:1rem;color:var(--fg);font-weight:600; }
</style>
</head>
<body>
<main>
  <h1>高次式の因数分解</h1>
  <p class="subtitle">複数の公式を組み合わせて、6次式を完全に因数分解します。</p>

  <h2>使う公式（復習）</h2>
  <div class="ref-box">
    <div class="ref-row" id="r1"></div>
    <div class="ref-row" id="r2"></div>
    <div class="ref-row" id="r3"></div>
  </div>

  <h2>例題: <span id="ex-label"></span> の因数分解</h2>
  <p class="subtitle">「次へ」で1ステップずつ進みます。</p>

  <div class="walkthrough" id="walkthrough"></div>
  <div class="controls-row">
    <button class="btn" id="prev">← 戻る</button>
    <div class="step-counter">ステップ <span id="step-cur"></span> / <span id="step-tot"></span></div>
    <button class="btn primary" id="next">次へ →</button>
  </div>
</main>
<script>
  const CA="#d9534f", CB="#2a6df4", CG="#28a745", CP="#6f42c1";
  const T=l=>katex.renderToString(l,{throwOnError:false});
  const tex=(l,el)=>katex.render(l,el,{throwOnError:false});

  const REF1=`a^2-b^2=(a+b)(a-b)`;
  const REF2=`a^3+b^3=(a+b)(a^2-ab+b^2)`;
  const REF3=`a^3-b^3=(a-b)(a^2+ab+b^2)`;

  // x⁶ - y⁶ factorization — built lazily inside init() after KaTeX loads
  let steps=[];

  let curStep=0;

  function render(){
    const root=document.getElementById('walkthrough');
    let html='';
    for(let i=0;i<=curStep;i++){
      const s=steps[i];
      const isCur=i===curStep;
      const isRes=s.type==='result';
      let tagHTML=s.tag?`<div class="tag">${T(s.tag)}</div>`:'';
      let labelHTML=typeof s.title==='string'?s.title:s.title;
      html+=`<div class="step${isCur?' current':''}${isCur&&isRes?' result-step':''}">
        ${tagHTML}
        <div class="label">${labelHTML}</div>
        <div class="formula-line">${T(s.formula)}</div>
      </div>`;
    }
    root.innerHTML=html;
    tex(String(curStep+1),document.getElementById('step-cur'));
    tex(String(steps.length),document.getElementById('step-tot'));
    document.getElementById('prev').disabled=curStep===0;
    document.getElementById('next').disabled=curStep===steps.length-1;
    const last=root.lastElementChild;
    if(last) last.scrollIntoView({block:'nearest',behavior:'smooth'});
  }

  function init(){
    steps=[
      {title:"因数分解する式", formula:"x^6-y^6", tag:null},
      {title:`${T('x^6=(x^3)^2')}、${T('y^6=(y^3)^2')} と見る`,
       formula:`x^6-y^6=(\\textcolor{${CA}}{x^3})^2-(\\textcolor{${CB}}{y^3})^2`,
       tag:`a^2-b^2 \\text{の形}`},
      {title:`公式 ${T('a^2-b^2=(a+b)(a-b)')} を適用`,
       formula:`=(\\textcolor{${CA}}{x^3}+\\textcolor{${CB}}{y^3})(\\textcolor{${CA}}{x^3}-\\textcolor{${CB}}{y^3})`,
       tag:null},
      {title:`前の因数: ${T('a^3+b^3')} の公式を適用`,
       formula:`=(\\textcolor{${CA}}{x}+\\textcolor{${CB}}{y})(\\textcolor{${CA}}{x}^2-\\textcolor{${CA}}{x}\\textcolor{${CB}}{y}+\\textcolor{${CB}}{y}^2)\\cdot(\\textcolor{${CA}}{x^3}-\\textcolor{${CB}}{y^3})`,
       tag:`a^3+b^3=(a+b)(a^2-ab+b^2)`},
      {title:`後の因数: ${T('a^3-b^3')} の公式を適用`,
       formula:`=(\\textcolor{${CA}}{x}+\\textcolor{${CB}}{y})(\\textcolor{${CA}}{x}^2-\\textcolor{${CA}}{x}\\textcolor{${CB}}{y}+\\textcolor{${CB}}{y}^2)\\cdot(\\textcolor{${CA}}{x}-\\textcolor{${CB}}{y})(\\textcolor{${CA}}{x}^2+\\textcolor{${CA}}{x}\\textcolor{${CB}}{y}+\\textcolor{${CB}}{y}^2)`,
       tag:`a^3-b^3=(a-b)(a^2+ab+b^2)`},
      {title:"因数分解の完成",
       formula:"\\phantom{x^6-y^6}=(x+y)(x-y)(x^2-xy+y^2)(x^2+xy+y^2)",
       tag:null, type:"result"}
    ];
    tex(REF1,document.getElementById('r1'));
    tex(REF2,document.getElementById('r2'));
    tex(REF3,document.getElementById('r3'));
    tex('x^6-y^6',document.getElementById('ex-label'));
    document.getElementById('prev').addEventListener('click',()=>{if(curStep>0){curStep--;render();}});
    document.getElementById('next').addEventListener('click',()=>{if(curStep<steps.length-1){curStep++;render();}});
    render();
  }

  if(window.katex) init();
  else document.addEventListener('DOMContentLoaded',()=>{
    if(window.katex) init();
    else { const w=setInterval(()=>{if(window.katex){clearInterval(w);init();}},30); }
  });
</script>
</body>
</html>
