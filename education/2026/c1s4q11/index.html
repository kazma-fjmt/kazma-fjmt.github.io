<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>不等式の証明: x²+1 > x</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" integrity="sha384-nB0miv6/jRmo5UMMR1wu3Gz6NLsoTkbqJghGIsx//Rlm+ZU03BU6SQNC66uf4l5+" crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" integrity="sha384-7zkQWkzuo3B5mTepMUcHkMB5jZaolc2xDwL6VFqjFALcbeS9Ggm/Yr2r3Dy4lfFg" crossorigin="anonymous"></script>
<style>
  :root {
    --bg: #fafafa;
    --fg: #333;
    --muted: #888;
    --accent: #2a6df4;
    --c-red: #d9534f;
    --c-blue: #2a6df4;
    --c-green: #28a745;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic", sans-serif;
    background: var(--bg); color: var(--fg);
    line-height: 1.7;
    -webkit-text-size-adjust: 100%;
  }
  main {
    max-width: 800px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 4rem;
  }
  h1 { font-size: 1.5rem; margin: 0 0 .25rem; }
  .subtitle { color: var(--muted); font-size: .9rem; margin: 0 0 1.5rem; }
  h2 {
    font-size: 1.15rem;
    margin: 2.25rem 0 .75rem;
    border-left: 4px solid var(--accent);
    padding-left: .6rem;
  }
  p { margin: .75rem 0; }

  .formula {
    background: #fff;
    border: 1px solid #e3e3e3;
    border-radius: 10px;
    padding: 1rem;
    text-align: center;
    overflow-x: auto;
  }
  .formula .katex { font-size: 1.35rem; }

  .walkthrough {
    background: #fff;
    border: 1px solid #e3e3e3;
    border-radius: 10px;
    padding: .75rem 1.25rem;
    margin: 0 0 .75rem;
    min-height: 9rem;
    overflow-x: auto;
  }
  .step {
    padding: .75rem .25rem;
    border-bottom: 1px dashed #eee;
    opacity: 0;
    animation: fadeIn 0.4s ease forwards;
  }
  .step:last-child { border-bottom: none; }
  .step.current {
    background: #f0f5ff;
    border-radius: 8px;
    padding: .75rem;
    margin: .25rem -.5rem;
    border-bottom: none;
  }
  .step .label {
    color: var(--muted);
    font-size: .8rem;
    margin-bottom: .25rem;
  }
  .step .formula-line { text-align: left; overflow-x: auto; }
  .step .formula-line .katex { font-size: 1.2rem; }
  .step.current .formula-line .katex { font-size: 1.35rem; }

  .controls-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: .75rem;
    margin: 1rem 0 0;
  }
  .btn {
    appearance: none;
    border: 1px solid #d4dbeb;
    background: #fff;
    color: var(--accent);
    font-size: 1rem;
    font-weight: 600;
    padding: .85rem 1.2rem;
    border-radius: 10px;
    cursor: pointer;
    min-height: 48px;
    min-width: 110px;
    font-family: inherit;
    user-select: none;
  }
  .btn.primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .btn:disabled { opacity: .3; cursor: not-allowed; }
  .btn:active:not(:disabled) { transform: scale(.97); }
  .step-counter {
    color: var(--muted);
    font-size: .9rem;
    text-align: center;
    flex: 1;
  }

  /* Graph */
  .graph-container {
    position: relative;
    background: #fff;
    border: 1px solid #e3e3e3;
    border-radius: 10px;
    padding: 1rem;
    margin: 1rem 0;
    overflow: hidden;
  }
  canvas {
    display: block;
    width: 100%;
    height: auto;
    border-radius: 8px;
  }
  .graph-legend {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    font-size: .85rem;
    color: var(--muted);
    margin-top: .75rem;
  }
  .graph-legend .swatch {
    display: inline-block;
    width: .75rem; height: .75rem;
    border-radius: 50%;
    margin-right: .35rem;
    vertical-align: middle;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<main>
  <h1>不等式の証明: 平方完成</h1>
  <p class="subtitle">平方完成を使って、すべての実数で成り立つ不等式を証明します。</p>

  <h2>証明する不等式</h2>
  <div class="formula" id="target-ineq"></div>

  <h2>グラフで確認</h2>
  <div class="graph-container">
    <canvas id="graph" width="700" height="400"></canvas>
    <div class="graph-legend" id="graph-legend"></div>
  </div>

  <h2>証明のステップ</h2>
  <div class="walkthrough" id="walkthrough"></div>
  <div class="controls-row">
    <button class="btn" id="prev">← 戻る</button>
    <div class="step-counter">ステップ <span id="step-cur"></span> / <span id="step-tot"></span></div>
    <button class="btn primary" id="next">次へ →</button>
  </div>
</main>

<script>
  function tex(latex, target, displayMode = false) {
    katex.render(latex, target, { throwOnError: false, displayMode });
  }
  function T(l) {
    return katex.renderToString(l, { throwOnError: false });
  }

  const C_RED = "#d9534f";
  const C_BLUE = "#2a6df4";
  const C_GREEN = "#28a745";

  const steps = [
    {
      title: "証明の方針",
      tex: `x^2 + 1 > x \\quad \\text{を示すには} \\quad x^2 + 1 - x > 0 \\quad \\text{を示せばよい}`
    },
    {
      title: "左辺 - 右辺を計算する",
      tex: `x^2 + 1 - x`
    },
    {
      title: "平方完成する",
      tex: `x^2 - x + 1 = \\textcolor{${C_RED}}{\\left(x - \\frac{1}{2}\\right)^2} - \\frac{1}{4} + 1`
    },
    {
      title: "整理する",
      tex: `= \\textcolor{${C_RED}}{\\left(x - \\frac{1}{2}\\right)^2} + \\textcolor{${C_BLUE}}{\\frac{3}{4}}`
    },
    {
      title: "各項の符号を確認する",
      tex: `\\textcolor{${C_RED}}{\\left(x - \\frac{1}{2}\\right)^2 \\ge 0}\\,,\\quad \\textcolor{${C_BLUE}}{\\frac{3}{4} > 0}`
    },
    {
      title: "結論",
      tex: `\\left(x - \\frac{1}{2}\\right)^2 + \\frac{3}{4} > 0 \\quad \\text{ゆえに} \\quad x^2 + 1 > x`
    }
  ];

  let curStep = 0;

  function renderWalkthrough() {
    const root = document.getElementById('walkthrough');
    let html = '';
    for (let i = 0; i <= curStep; i++) {
      const s = steps[i];
      const isCurrent = i === curStep;
      html += `<div class="step ${isCurrent ? 'current' : ''}" style="animation-delay:${isCurrent ? '0.05s' : '0s'}">
        <div class="label">${s.title}</div>
        <div class="formula-line">${T(s.tex)}</div>
      </div>`;
    }
    root.innerHTML = html;
    tex(String(curStep + 1), document.getElementById('step-cur'));
    tex(String(steps.length), document.getElementById('step-tot'));
    document.getElementById('prev').disabled = curStep === 0;
    document.getElementById('next').disabled = curStep === steps.length - 1;
  }

  // Graph animation
  function drawGraph() {
    const canvas = document.getElementById('graph');
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    const xMin = -2, xMax = 3, yMin = -1, yMax = 6;

    function toCanvasX(x) { return (x - xMin) / (xMax - xMin) * W; }
    function toCanvasY(y) { return H - (y - yMin) / (yMax - yMin) * H; }

    let progress = 0;
    const totalFrames = 60;

    function frame() {
      progress++;
      const t = Math.min(progress / totalFrames, 1);
      ctx.clearRect(0, 0, W, H);

      // Grid
      ctx.strokeStyle = '#eee';
      ctx.lineWidth = 1;
      for (let x = Math.ceil(xMin); x <= xMax; x++) {
        ctx.beginPath();
        ctx.moveTo(toCanvasX(x), 0);
        ctx.lineTo(toCanvasX(x), H);
        ctx.stroke();
      }
      for (let y = Math.ceil(yMin); y <= yMax; y++) {
        ctx.beginPath();
        ctx.moveTo(0, toCanvasY(y));
        ctx.lineTo(W, toCanvasY(y));
        ctx.stroke();
      }

      // Axes
      ctx.strokeStyle = '#999';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(toCanvasX(xMin), toCanvasY(0));
      ctx.lineTo(toCanvasX(xMax), toCanvasY(0));
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(toCanvasX(0), toCanvasY(yMin));
      ctx.lineTo(toCanvasX(0), toCanvasY(yMax));
      ctx.stroke();

      // y = x (blue line)
      const drawRange = xMin + (xMax - xMin) * t;
      ctx.strokeStyle = C_BLUE;
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      for (let px = 0; px <= W * t; px++) {
        const x = xMin + px / W * (xMax - xMin);
        const y = x;
        if (y < yMin || y > yMax) continue;
        if (px === 0) ctx.moveTo(toCanvasX(x), toCanvasY(y));
        else ctx.lineTo(toCanvasX(x), toCanvasY(y));
      }
      ctx.stroke();

      // y = x²+1 (red curve)
      ctx.strokeStyle = C_RED;
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      let started = false;
      for (let px = 0; px <= W * t; px++) {
        const x = xMin + px / W * (xMax - xMin);
        const y = x * x + 1;
        if (y < yMin || y > yMax) continue;
        if (!started) { ctx.moveTo(toCanvasX(x), toCanvasY(y)); started = true; }
        else ctx.lineTo(toCanvasX(x), toCanvasY(y));
      }
      ctx.stroke();

      // Shaded gap region
      if (t > 0.3) {
        const alpha = Math.min((t - 0.3) / 0.3, 0.15);
        ctx.fillStyle = `rgba(40, 167, 69, ${alpha})`;
        ctx.beginPath();
        for (let px = 0; px <= W; px++) {
          const x = xMin + px / W * (xMax - xMin);
          const y1 = x * x + 1;
          const cy = toCanvasY(Math.min(y1, yMax));
          if (px === 0) ctx.moveTo(toCanvasX(x), cy);
          else ctx.lineTo(toCanvasX(x), cy);
        }
        for (let px = W; px >= 0; px--) {
          const x = xMin + px / W * (xMax - xMin);
          const y2 = x;
          const cy = toCanvasY(Math.max(Math.min(y2, yMax), yMin));
          ctx.lineTo(toCanvasX(x), cy);
        }
        ctx.closePath();
        ctx.fill();
      }

      if (progress < totalFrames) requestAnimationFrame(frame);
    }
    frame();
  }

  function init() {
    tex('x^2 + 1 > x', document.getElementById('target-ineq'), true);

    document.getElementById('graph-legend').innerHTML =
      `<span><span class="swatch" style="background:${C_RED}"></span>${T('y = x^2 + 1')}</span>` +
      `<span><span class="swatch" style="background:${C_BLUE}"></span>${T('y = x')}</span>` +
      `<span><span class="swatch" style="background:${C_GREEN}"></span>差（常に正）</span>`;

    document.getElementById('prev').addEventListener('click', () => {
      if (curStep > 0) { curStep--; renderWalkthrough(); }
    });
    document.getElementById('next').addEventListener('click', () => {
      if (curStep < steps.length - 1) { curStep++; renderWalkthrough(); }
    });

    renderWalkthrough();
    drawGraph();
  }

  if (window.katex) init();
  else window.addEventListener("DOMContentLoaded", () => {
    if (window.katex) init();
    else {
      const wait = setInterval(() => {
        if (window.katex) { clearInterval(wait); init(); }
      }, 30);
    }
  });
</script>
</body>
</html>
