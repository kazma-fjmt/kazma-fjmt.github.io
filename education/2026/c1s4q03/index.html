<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>等式の証明</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" integrity="sha384-nB0miv6/jRmo5UMMR1wu3Gz6NLsoTkbqJghGIsx//Rlm+ZU03BU6SQNC66uf4l5+" crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" integrity="sha384-7zkQWkzuo3B5mTepMUcHkMB5jZaolc2xDwL6VFqjFALcbeS9Ggm/Yr2r3Dy4lfFg" crossorigin="anonymous"></script>
<style>
  :root {
    --bg: #fafafa; --fg: #333; --muted: #888; --accent: #2a6df4;
    --c-left: #d9534f; --c-right: #2a6df4;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic", sans-serif;
    background: var(--bg); color: var(--fg); line-height: 1.7;
    -webkit-text-size-adjust: 100%;
  }
  main { max-width: 800px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }
  h1 { font-size: 1.5rem; margin: 0 0 .25rem; }
  .subtitle { color: var(--muted); font-size: .9rem; margin: 0 0 1.5rem; }
  h2 {
    font-size: 1.15rem; margin: 2.25rem 0 .75rem;
    border-left: 4px solid var(--accent); padding-left: .6rem;
  }
  p { margin: .75rem 0; }

  .formula-box {
    background: #fff; border: 1px solid #e3e3e3; border-radius: 10px;
    padding: 1rem 1.25rem; text-align: center; overflow-x: auto; margin: .75rem 0;
  }
  .formula-box .katex { font-size: 1.3rem; }

  .strategy-list {
    list-style: none; padding: 0; margin: .75rem 0;
  }
  .strategy-list li {
    background: #fff; border: 1px solid #e3e3e3; border-radius: 10px;
    padding: .85rem 1rem; margin: .5rem 0; overflow-x: auto;
    animation: slideIn .3s ease;
  }
  .strategy-list li .num {
    display: inline-block; width: 1.6rem; height: 1.6rem;
    background: var(--accent); color: #fff; border-radius: 50%;
    text-align: center; line-height: 1.6rem; font-size: .85rem;
    font-weight: 700; margin-right: .5rem; flex-shrink: 0;
  }

  .tabs {
    display: flex; gap: .5rem; margin: .75rem 0 1rem; flex-wrap: wrap;
  }
  .tab {
    flex: 1 1 200px; appearance: none; background: #fff;
    border: 1.5px solid #d4dbeb; color: var(--fg); border-radius: 10px;
    padding: 1rem .75rem; font-size: 1rem; font-family: inherit;
    cursor: pointer; min-height: 56px; user-select: none;
    transition: border-color .15s ease, background .15s ease;
  }
  .tab.active { border-color: var(--accent); background: #eef4ff; }
  .tab:active { transform: scale(.98); }

  .walkthrough {
    background: #fff; border: 1px solid #e3e3e3; border-radius: 10px;
    padding: .75rem 1.25rem; margin: 0 0 .75rem; min-height: 9rem; overflow-x: auto;
  }
  .step {
    padding: .75rem .25rem; border-bottom: 1px dashed #eee;
    animation: fadeIn .3s ease;
  }
  .step:last-child { border-bottom: none; }
  .step.current {
    background: #f0f5ff; border-radius: 8px; padding: .75rem;
    margin: .25rem -.5rem; border-bottom: none;
  }
  .step .label { color: var(--muted); font-size: .8rem; margin-bottom: .25rem; }
  .step .formula-line { text-align: left; overflow-x: auto; }
  .step .formula-line .katex { font-size: 1.2rem; }
  .step.current .formula-line .katex { font-size: 1.35rem; }

  .controls-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: .75rem; margin: 1rem 0 0;
  }
  .btn {
    appearance: none; border: 1px solid #d4dbeb; background: #fff;
    color: var(--accent); font-size: 1rem; font-weight: 600;
    padding: .85rem 1.2rem; border-radius: 10px; cursor: pointer;
    min-height: 48px; min-width: 110px; font-family: inherit; user-select: none;
  }
  .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn:disabled { opacity: .3; cursor: not-allowed; }
  .btn:active:not(:disabled) { transform: scale(.97); }
  .step-counter { color: var(--muted); font-size: .9rem; text-align: center; flex: 1; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideIn { from { opacity: 0; transform: translateX(-12px); } to { opacity: 1; transform: translateX(0); } }
</style>
</head>
<body>
<main>
  <h1>等式の証明</h1>
  <p class="subtitle">等式が恒等式であることを示す3つの方法を学びましょう。</p>

  <h2>証明の3つの方針</h2>
  <ul class="strategy-list" id="strategies"></ul>

  <h2>例1（方針1を使う）</h2>
  <div class="formula-box" id="ex1-problem"></div>
  <p class="subtitle">「次へ」で1ステップずつ進みます。</p>
  <div class="tabs" id="tabs">
    <button class="tab active" data-idx="0">例1</button>
    <button class="tab" data-idx="1">例題3</button>
  </div>

  <div class="walkthrough" id="walkthrough"></div>
  <div class="controls-row">
    <button class="btn" id="prev">← 戻る</button>
    <div class="step-counter">ステップ <span id="step-cur"></span> / <span id="step-tot"></span></div>
    <button class="btn primary" id="next">次へ →</button>
  </div>
</main>

<script>
  const CL = "#d9534f", CR = "#2a6df4";
  function tex(latex, el, dm) {
    katex.render(latex, el, { throwOnError: false, displayMode: !!dm });
  }
  function T(l) { return katex.renderToString(l, { throwOnError: false }); }

  const examples = [
    // 例1: (2a+b)^2-(a+2b)^2=3(a^2-b^2) — 方針1
    [
      { title: "証明する等式", tex: `\\textcolor{${CL}}{(2a+b)^2 - (a+2b)^2} = \\textcolor{${CR}}{3(a^2-b^2)}` },
      { title: "左辺を展開する", tex: "(2a+b)^2 - (a+2b)^2" },
      { title: "それぞれ展開", tex: "= (4a^2 + 4ab + b^2) - (a^2 + 4ab + 4b^2)" },
      { title: "整理する", tex: "= 3a^2 - 3b^2" },
      { title: "因数分解", tex: "= 3(a^2 - b^2)" },
      { title: "左辺 = 右辺 が示された", tex: "\\therefore\\quad (2a+b)^2 - (a+2b)^2 = 3(a^2-b^2) \\quad \\blacksquare" },
    ],
    // 例題3: (x+1)^3-(3x^2+1)=(x-1)^3+(3x^2+1) — 方針2
    [
      { title: "証明する等式（方針2：両辺を同じ式に変形）", tex: `\\textcolor{${CL}}{(x+1)^3 - (3x^2+1)} = \\textcolor{${CR}}{(x-1)^3 + (3x^2+1)}` },
      { title: "左辺を展開する", tex: `\\textcolor{${CL}}{(x+1)^3 - (3x^2+1)}` },
      { title: "展開", tex: "= (x^3 + 3x^2 + 3x + 1) - (3x^2 + 1)" },
      { title: "整理", tex: `= \\textcolor{${CL}}{x^3 + 3x}` },
      { title: "右辺を展開する", tex: `\\textcolor{${CR}}{(x-1)^3 + (3x^2+1)}` },
      { title: "展開", tex: "= (x^3 - 3x^2 + 3x - 1) + (3x^2 + 1)" },
      { title: "整理", tex: `= \\textcolor{${CR}}{x^3 + 3x}` },
      { title: "左辺 = 右辺 が示された", tex: "\\therefore\\quad (x+1)^3 - (3x^2+1) = (x-1)^3 + (3x^2+1) \\quad \\blacksquare" },
    ]
  ];

  let curEx = 0, curStep = 0;

  function render() {
    const steps = examples[curEx];
    const root = document.getElementById('walkthrough');
    let html = '';
    for (let i = 0; i <= curStep; i++) {
      const s = steps[i];
      const cls = i === curStep ? 'current' : '';
      html += `<div class="step ${cls}">
        <div class="label">${s.title}</div>
        <div class="formula-line">${T(s.tex)}</div>
      </div>`;
    }
    root.innerHTML = html;
    tex(String(curStep + 1), document.getElementById('step-cur'));
    tex(String(steps.length), document.getElementById('step-tot'));
    document.getElementById('prev').disabled = curStep === 0;
    document.getElementById('next').disabled = curStep === steps.length - 1;
    const last = root.lastElementChild;
    if (last) last.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }

  function selectEx(idx) {
    curEx = idx; curStep = 0;
    document.querySelectorAll('.tab').forEach(t =>
      t.classList.toggle('active', parseInt(t.dataset.idx) === idx));
    render();
  }

  function init() {
    const strats = [
      [T("A"), " を変形して ", T("B"), " を導く（またはその逆）"],
      [T("A"), " と ", T("B"), " をそれぞれ変形して同じ式 ", T("C"), " を導く"],
      [T("A - B = 0"), " を示す"]
    ];
    const ul = document.getElementById('strategies');
    ul.innerHTML = strats.map((parts, i) =>
      `<li><span class="num">${i+1}</span>${parts.join('')}</li>`
    ).join('');

    tex("(2a+b)^2 - (a+2b)^2 = 3(a^2 - b^2)", document.getElementById('ex1-problem'), true);

    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => selectEx(parseInt(tab.dataset.idx)));
    });
    document.getElementById('prev').addEventListener('click', () => {
      if (curStep > 0) { curStep--; render(); }
    });
    document.getElementById('next').addEventListener('click', () => {
      if (curStep < examples[curEx].length - 1) { curStep++; render(); }
    });
    render();
  }

  if (window.katex) init();
  else window.addEventListener("DOMContentLoaded", () => {
    if (window.katex) init();
    else { const w = setInterval(() => { if (window.katex) { clearInterval(w); init(); } }, 30); }
  });
</script>
</body>
</html>
