<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>絶対値記号を含む不等式の証明</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" integrity="sha384-nB0miv6/jRmo5UMMR1wu3Gz6NLsoTkbqJghGIsx//Rlm+ZU03BU6SQNC66uf4l5+" crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" integrity="sha384-7zkQWkzuo3B5mTepMUcHkMB5jZaolc2xDwL6VFqjFALcbeS9Ggm/Yr2r3Dy4lfFg" crossorigin="anonymous"></script>
<style>
  :root {
    --bg: #fafafa;
    --fg: #333;
    --muted: #888;
    --accent: #2a6df4;
    --c-red: #d9534f;
    --c-blue: #2a6df4;
    --c-green: #28a745;
    --c-orange: #e67e22;
    --c-purple: #7b61ff;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic", sans-serif;
    background: var(--bg); color: var(--fg);
    line-height: 1.7;
    -webkit-text-size-adjust: 100%;
  }
  main {
    max-width: 800px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 4rem;
  }
  h1 { font-size: 1.5rem; margin: 0 0 .25rem; }
  .subtitle { color: var(--muted); font-size: .9rem; margin: 0 0 1.5rem; }
  h2 {
    font-size: 1.15rem;
    margin: 2.25rem 0 .75rem;
    border-left: 4px solid var(--accent);
    padding-left: .6rem;
  }
  p { margin: .75rem 0; }

  .props-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: .75rem;
    margin: 1rem 0;
  }
  @media (max-width: 600px) {
    .props-grid { grid-template-columns: 1fr; }
  }
  .prop-card {
    background: #eef4ff;
    border: 1.5px solid var(--accent);
    border-radius: 10px;
    padding: .75rem 1rem;
    text-align: center;
  }
  .prop-card .katex { font-size: 1.1rem; }

  .formula {
    background: #fff;
    border: 1px solid #e3e3e3;
    border-radius: 10px;
    padding: 1rem;
    text-align: center;
    overflow-x: auto;
  }
  .formula .katex { font-size: 1.35rem; }

  /* Number line visualization */
  .numline-container {
    background: #fff;
    border: 1px solid #e3e3e3;
    border-radius: 10px;
    padding: 1.5rem 1rem;
    margin: 1rem 0;
    overflow-x: auto;
  }
  .numline-controls {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 1rem;
  }
  .numline-controls label {
    display: flex;
    align-items: center;
    gap: .4rem;
    font-size: .9rem;
  }
  .numline-controls input[type="range"] {
    width: 100px;
  }
  canvas#numline {
    display: block;
    width: 100%;
    height: auto;
    border-radius: 6px;
  }
  .numline-legend {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    font-size: .85rem;
    color: var(--muted);
    margin-top: .75rem;
    flex-wrap: wrap;
  }
  .numline-legend .swatch {
    display: inline-block;
    width: .75rem; height: .75rem;
    border-radius: 50%;
    margin-right: .35rem;
    vertical-align: middle;
  }

  .walkthrough {
    background: #fff;
    border: 1px solid #e3e3e3;
    border-radius: 10px;
    padding: .75rem 1.25rem;
    margin: 0 0 .75rem;
    min-height: 9rem;
    overflow-x: auto;
  }
  .step {
    padding: .75rem .25rem;
    border-bottom: 1px dashed #eee;
    opacity: 0;
    animation: fadeIn 0.4s ease forwards;
  }
  .step:last-child { border-bottom: none; }
  .step.current {
    background: #f0f5ff;
    border-radius: 8px;
    padding: .75rem;
    margin: .25rem -.5rem;
    border-bottom: none;
  }
  .step .label {
    color: var(--muted);
    font-size: .8rem;
    margin-bottom: .25rem;
  }
  .step .formula-line { text-align: left; overflow-x: auto; }
  .step .formula-line .katex { font-size: 1.2rem; }
  .step.current .formula-line .katex { font-size: 1.35rem; }

  .controls-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: .75rem;
    margin: 1rem 0 0;
  }
  .btn {
    appearance: none;
    border: 1px solid #d4dbeb;
    background: #fff;
    color: var(--accent);
    font-size: 1rem;
    font-weight: 600;
    padding: .85rem 1.2rem;
    border-radius: 10px;
    cursor: pointer;
    min-height: 48px;
    min-width: 110px;
    font-family: inherit;
    user-select: none;
  }
  .btn.primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .btn:disabled { opacity: .3; cursor: not-allowed; }
  .btn:active:not(:disabled) { transform: scale(.97); }
  .step-counter {
    color: var(--muted);
    font-size: .9rem;
    text-align: center;
    flex: 1;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<main>
  <h1>絶対値記号を含む不等式</h1>
  <p class="subtitle">絶対値の性質を使って三角不等式を証明します。</p>

  <h2>絶対値の性質</h2>
  <div class="props-grid" id="props-grid"></div>

  <h2>三角不等式</h2>
  <div class="formula" id="target-ineq"></div>

  <h2>数直線で確認</h2>
  <div class="numline-container">
    <div class="numline-controls">
      <label><span id="label-a"></span> <input type="range" id="slider-a" min="-5" max="5" step="0.5" value="3"> <span id="val-a"></span></label>
      <label><span id="label-b"></span> <input type="range" id="slider-b" min="-5" max="5" step="0.5" value="-2"> <span id="val-b"></span></label>
    </div>
    <canvas id="numline" width="700" height="180"></canvas>
    <div class="numline-legend" id="numline-legend"></div>
    <p style="text-align:center; margin-top:.5rem; font-size:.9rem;" id="numline-result"></p>
  </div>

  <h2>証明のステップ</h2>
  <div class="walkthrough" id="walkthrough"></div>
  <div class="controls-row">
    <button class="btn" id="prev">← 戻る</button>
    <div class="step-counter">ステップ <span id="step-cur"></span> / <span id="step-tot"></span></div>
    <button class="btn primary" id="next">次へ →</button>
  </div>
</main>

<script>
  function tex(latex, target, displayMode = false) {
    katex.render(latex, target, { throwOnError: false, displayMode });
  }
  function T(l) {
    return katex.renderToString(l, { throwOnError: false });
  }

  const C_RED = "#d9534f";
  const C_BLUE = "#2a6df4";
  const C_GREEN = "#28a745";
  const C_ORANGE = "#e67e22";
  const C_PURPLE = "#7b61ff";

  const steps = [
    {
      title: "証明の方針",
      tex: `|a| + |b| \\ge |a+b| \\quad \\text{を平方の比較で示す}`
    },
    {
      title: "両辺が正であることを確認する",
      tex: `|a| + |b| \\ge 0\\,,\\quad |a+b| \\ge 0`
    },
    {
      title: "平方の差を考える",
      tex: `(|a| + |b|)^2 - |a+b|^2`
    },
    {
      title: "それぞれ展開する",
      tex: `= |a|^2 + 2|a||b| + |b|^2 - (a+b)^2`
    },
    {
      title: "|A|^2 = A^2 を使う",
      tex: `= a^2 + 2|ab| + b^2 - (a^2 + 2ab + b^2)`
    },
    {
      title: "整理する",
      tex: `= 2(\\textcolor{${C_GREEN}}{|ab| - ab})`
    },
    {
      title: "|ab| >= ab を確認する",
      tex: `|ab| \\ge ab \\quad \\text{より} \\quad \\textcolor{${C_GREEN}}{|ab| - ab \\ge 0}`
    },
    {
      title: "平方の大小関係を得る",
      tex: `(|a| + |b|)^2 \\ge |a+b|^2`
    },
    {
      title: "結論",
      tex: `|a| + |b| \\ge 0,\\; |a+b| \\ge 0 \\quad \\text{より} \\quad |a| + |b| \\ge |a+b|`
    },
    {
      title: "等号条件",
      tex: `|ab| = ab \\quad \\text{すなわち} \\quad \\textcolor{${C_GREEN}}{ab \\ge 0} \\quad \\text{のとき等号成立}`
    }
  ];

  let curStep = 0;

  function renderWalkthrough() {
    const root = document.getElementById('walkthrough');
    let html = '';
    for (let i = 0; i <= curStep; i++) {
      const s = steps[i];
      const isCurrent = i === curStep;
      html += `<div class="step ${isCurrent ? 'current' : ''}" style="animation-delay:${isCurrent ? '0.05s' : '0s'}">
        <div class="label">${s.title}</div>
        <div class="formula-line">${T(s.tex)}</div>
      </div>`;
    }
    root.innerHTML = html;
    tex(String(curStep + 1), document.getElementById('step-cur'));
    tex(String(steps.length), document.getElementById('step-tot'));
    document.getElementById('prev').disabled = curStep === 0;
    document.getElementById('next').disabled = curStep === steps.length - 1;
  }

  function drawNumline() {
    const a = parseFloat(document.getElementById('slider-a').value);
    const b = parseFloat(document.getElementById('slider-b').value);
    const canvas = document.getElementById('numline');
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;

    const absA = Math.abs(a);
    const absB = Math.abs(b);
    const absApB = Math.abs(a + b);
    const lhs = absA + absB;

    const maxVal = Math.max(absA, absB, absApB, lhs, 5) + 1;
    const xMin = -maxVal, xMax = maxVal;

    function toX(v) { return (v - xMin) / (xMax - xMin) * W; }

    ctx.clearRect(0, 0, W, H);

    // Axis
    const axisY = 90;
    ctx.strokeStyle = '#999';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(20, axisY);
    ctx.lineTo(W - 20, axisY);
    ctx.stroke();

    // Origin
    ctx.fillStyle = '#999';
    ctx.font = '13px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('0', toX(0), axisY + 18);
    ctx.beginPath();
    ctx.arc(toX(0), axisY, 3, 0, Math.PI * 2);
    ctx.fill();

    // Tick marks
    for (let v = Math.ceil(xMin); v <= Math.floor(xMax); v++) {
      if (v === 0) continue;
      const x = toX(v);
      ctx.beginPath();
      ctx.moveTo(x, axisY - 4);
      ctx.lineTo(x, axisY + 4);
      ctx.strokeStyle = '#ccc';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    // |a+b| bracket (below axis)
    const y3 = axisY + 30;
    ctx.strokeStyle = C_PURPLE;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(toX(0), y3);
    ctx.lineTo(toX(a + b), y3);
    ctx.stroke();
    // endpoints
    ctx.beginPath(); ctx.arc(toX(0), y3, 4, 0, Math.PI * 2); ctx.fillStyle = C_PURPLE; ctx.fill();
    ctx.beginPath(); ctx.arc(toX(a + b), y3, 4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = C_PURPLE;
    ctx.font = '12px sans-serif';
    ctx.fillText('|a+b| = ' + absApB.toFixed(1), (toX(0) + toX(a + b)) / 2, y3 + 18);

    // |a| bracket (above axis, row 1)
    const y1 = axisY - 25;
    ctx.strokeStyle = C_RED;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(toX(0), y1);
    ctx.lineTo(toX(a), y1);
    ctx.stroke();
    ctx.beginPath(); ctx.arc(toX(0), y1, 4, 0, Math.PI * 2); ctx.fillStyle = C_RED; ctx.fill();
    ctx.beginPath(); ctx.arc(toX(a), y1, 4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = C_RED;
    ctx.fillText('|a| = ' + absA.toFixed(1), (toX(0) + toX(a)) / 2, y1 - 8);

    // |b| bracket (above axis, row 2)
    const y2 = axisY - 55;
    ctx.strokeStyle = C_BLUE;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(toX(0), y2);
    ctx.lineTo(toX(b), y2);
    ctx.stroke();
    ctx.beginPath(); ctx.arc(toX(0), y2, 4, 0, Math.PI * 2); ctx.fillStyle = C_BLUE; ctx.fill();
    ctx.beginPath(); ctx.arc(toX(b), y2, 4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = C_BLUE;
    ctx.fillText('|b| = ' + absB.toFixed(1), (toX(0) + toX(b)) / 2, y2 - 8);

    // Result text
    const eq = Math.abs(lhs - absApB) < 0.01;
    const resultEl = document.getElementById('numline-result');
    resultEl.innerHTML = T(`|a|+|b| = ${lhs.toFixed(1)}`) + (eq ? ' = ' : ' > ') + T(`|a+b| = ${absApB.toFixed(1)}`) +
      (eq ? '  (等号成立)' : '');
  }

  function init() {
    const propsData = [
      '|A|^2 = A^2',
      '|A| \\ge A',
      '|A| \\ge -A',
      '|A|\\cdot|B| = |AB|'
    ];
    const grid = document.getElementById('props-grid');
    grid.innerHTML = propsData.map(p => `<div class="prop-card">${T(p)}</div>`).join('');

    tex('|a| + |b| \\ge |a + b|', document.getElementById('target-ineq'), true);

    tex('a =', document.getElementById('label-a'));
    tex('b =', document.getElementById('label-b'));
    tex('3', document.getElementById('val-a'));
    tex('-2', document.getElementById('val-b'));

    document.getElementById('numline-legend').innerHTML =
      `<span><span class="swatch" style="background:${C_RED}"></span>${T('|a|')}</span>` +
      `<span><span class="swatch" style="background:${C_BLUE}"></span>${T('|b|')}</span>` +
      `<span><span class="swatch" style="background:${C_PURPLE}"></span>${T('|a+b|')}</span>`;

    const sliderA = document.getElementById('slider-a');
    const sliderB = document.getElementById('slider-b');

    function updateSliders() {
      const a = parseFloat(sliderA.value);
      const b = parseFloat(sliderB.value);
      tex(String(a), document.getElementById('val-a'));
      tex(String(b), document.getElementById('val-b'));
      drawNumline();
    }

    sliderA.addEventListener('input', updateSliders);
    sliderB.addEventListener('input', updateSliders);

    document.getElementById('prev').addEventListener('click', () => {
      if (curStep > 0) { curStep--; renderWalkthrough(); }
    });
    document.getElementById('next').addEventListener('click', () => {
      if (curStep < steps.length - 1) { curStep++; renderWalkthrough(); }
    });

    renderWalkthrough();
    drawNumline();
  }

  if (window.katex) init();
  else window.addEventListener("DOMContentLoaded", () => {
    if (window.katex) init();
    else {
      const wait = setInterval(() => {
        if (window.katex) { clearInterval(wait); init(); }
      }, 30);
    }
  });
</script>
</body>
</html>
