<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>単項式・次数・係数 — 1章1節</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" integrity="sha384-nB0miv6/jRmo5UMMR1wu3Gz6NLsoTkbqJghGIsx//Rlm+ZU03BU6SQNC66uf4l5+" crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" integrity="sha384-7zkQWkzuo3B5mTepMUcHkMB5jZaolc2xDwL6VFqjFALcbeS9Ggm/Yr2r3Dy4lfFg" crossorigin="anonymous"></script>
<style>
  :root {
    --bg: #fafafa;
    --fg: #333;
    --muted: #888;
    --accent: #2a6df4;
    --num: #d9534f;
    --var: #2a6df4;
    --pill: #eef2ff;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic", sans-serif;
    background: var(--bg);
    color: var(--fg);
    line-height: 1.7;
  }
  main {
    max-width: 760px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 4rem;
  }
  h1 {
    font-size: 1.5rem;
    margin: 0 0 .25rem;
  }
  .subtitle {
    color: var(--muted);
    font-size: .9rem;
    margin: 0 0 2rem;
  }
  h2 {
    font-size: 1.15rem;
    margin: 2.5rem 0 .75rem;
    border-left: 4px solid var(--accent);
    padding-left: .6rem;
  }
  p { margin: .6rem 0; }
  .term { color: var(--accent); font-weight: 600; }

  /* Card grid */
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 1rem;
    margin-top: 1rem;
  }
  .card {
    background: #fff;
    border: 1px solid #e3e3e3;
    border-radius: 10px;
    padding: 1.5rem 1rem 1.25rem;
    cursor: pointer;
    transition: box-shadow .15s ease, transform .15s ease;
    user-select: none;
    text-align: center;
  }
  .card:hover { box-shadow: 0 4px 14px rgba(0,0,0,.07); transform: translateY(-1px); }
  .card.active { box-shadow: 0 4px 18px rgba(42,109,244,.18); border-color: var(--accent); }
  .card .mono { margin: 0 0 .75rem; min-height: 2.6rem; display:flex; align-items:center; justify-content:center; }
  .card .mono .katex { font-size: 1.9rem; }
  .card .hint { color: var(--muted); font-size: .8rem; margin: 0; }

  /* Detail */
  .detail {
    margin-top: 1.25rem;
    padding: 1.25rem 1.25rem 1.5rem;
    background: #fff;
    border: 1px solid #e3e3e3;
    border-radius: 10px;
    min-height: 220px;
  }
  .detail-row {
    display: flex;
    align-items: center;
    gap: .9rem;
    flex-wrap: wrap;
    margin: .85rem 0;
  }
  .detail-label {
    font-size: .85rem;
    color: var(--muted);
    min-width: 5rem;
  }
  .detail .katex { font-size: 1.4rem; }
  .detail .mono-big .katex { font-size: 1.8rem; }
  .pill {
    display: inline-flex;
    align-items: center;
    padding: .15rem .7rem;
    border-radius: 999px;
    background: var(--pill);
    color: var(--accent);
    font-weight: 600;
    font-size: .95rem;
  }
  .pill .katex { font-size: 1rem; }
  .factor-dots { display: flex; gap: .35rem; }
  .factor-dots .dot {
    width: 1.2rem; height: 1.2rem;
    border-radius: 50%;
    background: var(--var);
    display: inline-block;
  }
  .placeholder {
    color: var(--muted);
    text-align: center;
    padding: 2.5rem 0;
  }
  .note {
    color: var(--muted);
    font-size: .9rem;
    margin-top: 1rem;
  }

  /* Playground */
  .playground {
    background: #fff;
    border: 1px solid #e3e3e3;
    border-radius: 10px;
    padding: 1.25rem;
    margin-top: 1rem;
  }
  .controls {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    margin-bottom: 1rem;
  }
  .control label {
    display: block;
    font-size: .8rem;
    color: var(--muted);
    margin-bottom: .25rem;
  }
  .control input[type=range] { width: 100%; }
  .control .value {
    text-align: center;
    font-weight: 600;
  }
  .pg-display {
    text-align: center;
    padding: 1rem 0 .5rem;
    min-height: 4rem;
  }
  .pg-display .katex { font-size: 2.4rem; }
  .pg-meta {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    font-size: .95rem;
    color: var(--muted);
  }
  .pg-meta b { color: var(--fg); }
  .pg-dots-row {
    display: flex;
    justify-content: center;
    margin-top: .75rem;
  }

  .nav-back {
    display: inline-block;
    margin-bottom: 1rem;
    font-size: .85rem;
    color: var(--accent);
    text-decoration: none;
  }
  .nav-back:hover { text-decoration: underline; }
</style>
</head>
<body>
<main>
  <a class="nav-back" href="../">← 2026年度</a>
  <h1>単項式・次数・係数</h1>
  <p class="subtitle">1章1節 式の計算 / 単項式と多項式</p>

  <h2>単項式とは</h2>
  <p>
    数や文字、そしてそれらを掛け合わせてできる式を <span class="term">単項式</span> といいます。
    単項式には2つの大事な情報があります:
  </p>
  <ul>
    <li><span class="term">係数</span> — 掛け合わされた数の部分</li>
    <li><span class="term">次数</span> — 掛け合わされた文字の個数</li>
  </ul>

  <h2>例で見てみる</h2>
  <p class="subtitle">カードをタップすると分解図が表示されます。</p>
  <div class="cards" id="cards">
    <div class="card" data-key="2a"><div class="mono" data-tex="2a"></div><p class="hint">タップして分解</p></div>
    <div class="card" data-key="-x2y"><div class="mono" data-tex="-x^{2}y"></div><p class="hint">タップして分解</p></div>
    <div class="card" data-key="3"><div class="mono" data-tex="3"></div><p class="hint">タップして分解</p></div>
  </div>

  <div class="detail" id="detail">
    <div class="placeholder">↑ いずれかのカードをタップしてください</div>
  </div>

  <h2>自分で作ってみる</h2>
  <p class="subtitle">スライダーを動かして単項式を組み立て、係数と次数を観察しましょう。</p>
  <div class="playground">
    <div class="controls">
      <div class="control">
        <label>係数 (数)</label>
        <input type="range" id="pg-coef" min="-5" max="5" step="1" value="2">
        <div class="value" id="pg-coef-v">2</div>
      </div>
      <div class="control">
        <label>x の指数</label>
        <input type="range" id="pg-x" min="0" max="4" step="1" value="2">
        <div class="value" id="pg-x-v">2</div>
      </div>
      <div class="control">
        <label>y の指数</label>
        <input type="range" id="pg-y" min="0" max="4" step="1" value="1">
        <div class="value" id="pg-y-v">1</div>
      </div>
    </div>
    <div class="pg-display" id="pg-display"></div>
    <div class="pg-meta">
      <div>係数 = <b id="pg-coef-out">2</b></div>
      <div>次数 = <b id="pg-deg-out">3</b></div>
    </div>
    <div class="pg-dots-row" id="pg-dots"></div>
  </div>
</main>

<script>
  // Color hexes (kept in sync with CSS variables)
  const NUM = "#d9534f";
  const VAR = "#2a6df4";

  function tex(latex, target, displayMode = false) {
    katex.render(latex, target, { throwOnError: false, displayMode });
  }
  function texHTML(latex, displayMode = false) {
    return katex.renderToString(latex, { throwOnError: false, displayMode });
  }

  // ---------- Examples ----------
  const examples = {
    "2a": {
      tex: "2a",
      decomposeTex: `\\textcolor{${NUM}}{2} \\cdot \\textcolor{${VAR}}{a}`,
      coef: 2,
      vars: [["a", 1]],
      note: "a が 1 個。係数は 2、次数は 1。"
    },
    "-x2y": {
      tex: "-x^{2}y",
      decomposeTex: `\\textcolor{${NUM}}{(-1)} \\cdot \\textcolor{${VAR}}{x} \\cdot \\textcolor{${VAR}}{x} \\cdot \\textcolor{${VAR}}{y}`,
      coef: -1,
      vars: [["x", 2], ["y", 1]],
      note: "x² は x·x のこと。x が 2 個、y が 1 個で合計 3 個。係数は −1、次数は 3。"
    },
    "3": {
      tex: "3",
      decomposeTex: `\\textcolor{${NUM}}{3}`,
      coef: 3,
      vars: [],
      note: "文字を一つも含まない。係数は 3、次数は 0。"
    }
  };

  function dotsHTML(total) {
    if (total === 0) {
      return '<span style="color:var(--muted);font-size:.9rem;">文字なし (0個)</span>';
    }
    let html = '<div class="factor-dots">';
    for (let i = 0; i < total; i++) html += '<span class="dot"></span>';
    html += '</div>';
    return html;
  }

  function renderDetail(key) {
    const ex = examples[key];
    const degree = ex.vars.reduce((s, [, e]) => s + e, 0);
    const detail = document.getElementById("detail");
    detail.innerHTML = `
      <div class="detail-row">
        <span class="detail-label">単項式</span>
        <span class="mono-big">${texHTML(ex.tex)}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">分解</span>
        <span>${texHTML(ex.decomposeTex)}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">係数</span>
        <span class="pill">${texHTML(String(ex.coef))}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">次数</span>
        <span class="pill">${texHTML(String(degree))}</span>
        ${dotsHTML(degree)}
      </div>
      <p class="note">${ex.note}</p>
    `;
  }

  // ---------- Playground ----------
  function buildPgLatex(coef, xe, ye) {
    if (xe === 0 && ye === 0) return String(coef);
    let s = "";
    if (coef === 1) s = "";
    else if (coef === -1) s = "-";
    else s = String(coef);
    if (xe > 0) s += xe === 1 ? "x" : `x^{${xe}}`;
    if (ye > 0) s += ye === 1 ? "y" : `y^{${ye}}`;
    return s;
  }
  function pgRender() {
    const coef = parseInt(document.getElementById("pg-coef").value, 10);
    const xe = parseInt(document.getElementById("pg-x").value, 10);
    const ye = parseInt(document.getElementById("pg-y").value, 10);
    document.getElementById("pg-coef-v").textContent = coef;
    document.getElementById("pg-x-v").textContent = xe;
    document.getElementById("pg-y-v").textContent = ye;
    tex(buildPgLatex(coef, xe, ye), document.getElementById("pg-display"));
    document.getElementById("pg-coef-out").textContent = coef;
    document.getElementById("pg-deg-out").textContent = xe + ye;
    const total = xe + ye;
    let dots = "";
    if (total === 0) {
      dots = '<span style="color:var(--muted);font-size:.85rem;">次数 0</span>';
    } else {
      dots = '<div class="factor-dots">';
      for (let i = 0; i < xe; i++) dots += '<span class="dot" style="background:#2a6df4;"></span>';
      for (let i = 0; i < ye; i++) dots += '<span class="dot" style="background:#7aa6ff;"></span>';
      dots += '</div>';
    }
    document.getElementById("pg-dots").innerHTML = dots;
  }

  // ---------- Init (after KaTeX is ready) ----------
  function init() {
    // Render card monomials
    document.querySelectorAll(".card .mono").forEach(el => {
      tex(el.dataset.tex, el);
    });
    // Wire up cards
    document.querySelectorAll(".card").forEach(card => {
      card.addEventListener("click", () => {
        document.querySelectorAll(".card").forEach(c => c.classList.remove("active"));
        card.classList.add("active");
        renderDetail(card.dataset.key);
      });
    });
    // Wire up playground
    ["pg-coef", "pg-x", "pg-y"].forEach(id => {
      document.getElementById(id).addEventListener("input", pgRender);
    });
    pgRender();
    // Auto-select first card
    document.querySelector('.card[data-key="2a"]').click();
  }

  if (window.katex) init();
  else window.addEventListener("DOMContentLoaded", () => {
    if (window.katex) init();
    else {
      // KaTeX script is deferred; wait until it's available
      const wait = setInterval(() => {
        if (window.katex) { clearInterval(wait); init(); }
      }, 30);
    }
  });
</script>
</body>
</html>
