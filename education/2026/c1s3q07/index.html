<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>因数定理を利用した因数分解</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" integrity="sha384-nB0miv6/jRmo5UMMR1wu3Gz6NLsoTkbqJghGIsx//Rlm+ZU03BU6SQNC66uf4l5+" crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" integrity="sha384-7zkQWkzuo3B5mTepMUcHkMB5jZaolc2xDwL6VFqjFALcbeS9Ggm/Yr2r3Dy4lfFg" crossorigin="anonymous"></script>
<style>
  :root {
    --bg: #fafafa; --fg: #333; --muted: #888;
    --accent: #2a6df4; --success: #27ae60; --danger: #d9534f;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic", sans-serif;
    background: var(--bg); color: var(--fg); line-height: 1.7;
    -webkit-text-size-adjust: 100%;
  }
  main { max-width: 800px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }
  h1 { font-size: 1.5rem; margin: 0 0 .25rem; }
  .subtitle { color: var(--muted); font-size: .9rem; margin: 0 0 1.5rem; }
  h2 { font-size: 1.15rem; margin: 2.25rem 0 .75rem; border-left: 4px solid var(--accent); padding-left: .6rem; }
  p { margin: .75rem 0; }

  .card {
    background: #fff; border: 1px solid #e3e3e3;
    border-radius: 10px; padding: 1rem 1.25rem; margin: .75rem 0; overflow-x: auto;
  }

  .step {
    padding: .75rem .25rem; border-bottom: 1px dashed #eee;
    opacity: 0; transform: translateY(12px);
    animation: fadeSlideIn .4s ease forwards;
  }
  .step:last-child { border-bottom: none; }
  .step.current { background: #f0f5ff; border-radius: 8px; padding: .75rem; margin: .25rem -.5rem; border-bottom: none; }
  .step .label { color: var(--muted); font-size: .8rem; margin-bottom: .25rem; }
  .step .formula-line { text-align: left; overflow-x: auto; }
  .step .formula-line .katex { font-size: 1.2rem; }
  .step.current .formula-line .katex { font-size: 1.3rem; }

  @keyframes fadeSlideIn { to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.03); } }

  .result-badge {
    display: inline-block; padding: .35rem .8rem; border-radius: 8px;
    font-weight: 700; font-size: .95rem; margin-top: .5rem;
    animation: pulse .5s ease;
  }
  .result-badge.yes { background: #e8f8ef; color: var(--success); }

  /* Long division visualisation */
  .division-area {
    background: #fff; border: 1px solid #e3e3e3; border-radius: 10px;
    padding: 1.5rem; margin: 1rem 0; overflow-x: auto; min-height: 220px;
    position: relative;
  }
  .div-row {
    display: flex; gap: .5rem; align-items: center; min-height: 2.2rem;
    opacity: 0; transform: translateX(-15px);
    animation: slideInRow .4s ease forwards;
  }
  .div-row .katex { font-size: 1.15rem; }
  @keyframes slideInRow { to { opacity: 1; transform: translateX(0); } }
  .div-sep {
    height: 2px; background: var(--fg); margin: .25rem 0 .35rem;
    opacity: 0; animation: fadeSlideIn .3s ease forwards;
  }

  .controls-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: .75rem; margin: 1rem 0 0;
  }
  .btn {
    appearance: none; border: 1px solid #d4dbeb; background: #fff;
    color: var(--accent); font-size: 1rem; font-weight: 600;
    padding: .85rem 1.2rem; border-radius: 10px; cursor: pointer;
    min-height: 48px; min-width: 110px; font-family: inherit; user-select: none;
  }
  .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn:disabled { opacity: .3; cursor: not-allowed; }
  .btn:active:not(:disabled) { transform: scale(.97); }
  .step-counter { color: var(--muted); font-size: .9rem; text-align: center; flex: 1; }
</style>
</head>
<body>
<main>
  <h1>因数定理を利用した因数分解</h1>
  <p class="subtitle">因数定理で因数を見つけ、割り算で因数分解を完成させます。</p>

  <h2>例題2</h2>
  <p><span id="problem"></span> を因数分解せよ。</p>

  <h2>ステップ1: 因数を見つける</h2>
  <div class="card" id="find-factor"></div>

  <h2>ステップ2: 割り算で商を求める</h2>
  <p>割り算の各ステップを「次へ」で確認できます。</p>
  <div class="division-area" id="division"></div>
  <div class="controls-row">
    <button class="btn" id="prev">&larr; 戻る</button>
    <div class="step-counter">ステップ <span id="step-cur"></span> / <span id="step-tot"></span></div>
    <button class="btn primary" id="next">次へ &rarr;</button>
  </div>

  <h2>ステップ3: 最終結果</h2>
  <div class="card" id="final-result"></div>
</main>

<script>
  function tex(latex, el, dm) { katex.render(latex, el, { throwOnError: false, displayMode: !!dm }); }
  function T(l) { return katex.renderToString(l, { throwOnError: false }); }

  /* Division steps: dividing x^3 - 7x - 6 by x + 1 */
  var divSteps = [];
  var curDiv = 0;

  function buildDivSteps() {
    divSteps = [
      { label: "割られる式と割る式を並べる", rows: [
        { q: "", top: "x+1 \\;\\overline{\\;\\; x^3 + 0x^2 - 7x - 6 \\;\\;}" }
      ]},
      { label: "商の第1項を立てる", rows: [
        { q: "x^2", note: "x^3 \\div x = x^2" }
      ]},
      { label: "掛けて引く", rows: [
        { mul: "x^2(x+1) = x^3 + x^2" },
        { sub: "x^3 + 0x^2 - (x^3 + x^2) = -x^2" }
      ]},
      { label: "商の第2項を立てる", rows: [
        { q: "-x", note: "-x^2 \\div x = -x" }
      ]},
      { label: "掛けて引く", rows: [
        { mul: "-x(x+1) = -x^2 - x" },
        { sub: "-x^2 - 7x - (-x^2 - x) = -6x" }
      ]},
      { label: "商の第3項を立てる", rows: [
        { q: "-6", note: "-6x \\div x = -6" }
      ]},
      { label: "掛けて引く", rows: [
        { mul: "-6(x+1) = -6x - 6" },
        { sub: "-6x - 6 - (-6x - 6) = 0" }
      ]},
      { label: "割り算完了", rows: [
        { result: "(x^3 - 7x - 6) \\div (x+1) = x^2 - x - 6" }
      ]}
    ];
  }

  function renderDivision() {
    var root = document.getElementById('division');
    var html = '';
    for (var i = 0; i <= curDiv; i++) {
      var s = divSteps[i];
      var delay = i * 0.1;
      html += '<div class="div-row" style="animation-delay:' + delay + 's"><span style="color:var(--muted);font-size:.8rem;margin-right:.5rem;">' + s.label + '</span></div>';
      for (var j = 0; j < s.rows.length; j++) {
        var r = s.rows[j];
        delay += 0.05;
        if (r.top) html += '<div class="div-row" style="animation-delay:' + delay + 's">' + T(r.top) + '</div>';
        if (r.q) html += '<div class="div-row" style="animation-delay:' + delay + 's">商: ' + T(r.q) + (r.note ? ' <span style="color:var(--muted);font-size:.85rem;margin-left:.5rem;">(' + T(r.note) + ')</span>' : '') + '</div>';
        if (r.mul) html += '<div class="div-row" style="animation-delay:' + delay + 's">' + T(r.mul) + '</div>';
        if (r.sub) {
          html += '<div class="div-sep" style="animation-delay:' + delay + 's;max-width:350px"></div>';
          html += '<div class="div-row" style="animation-delay:' + delay + 's">' + T(r.sub) + '</div>';
        }
        if (r.result) html += '<div class="div-row" style="animation-delay:' + delay + 's"><div class="result-badge yes">' + T(r.result) + '</div></div>';
      }
    }
    root.innerHTML = html;
    tex(String(curDiv + 1), document.getElementById('step-cur'));
    tex(String(divSteps.length), document.getElementById('step-tot'));
    document.getElementById('prev').disabled = curDiv === 0;
    document.getElementById('next').disabled = curDiv === divSteps.length - 1;
  }

  function init() {
    buildDivSteps();

    tex("x^3 - 7x - 6", document.getElementById('problem'));

    // Step 1: find factor
    var findHTML = '';
    findHTML += '<div class="step current" style="animation-delay:0s"><div class="label">' + T("P(x) = x^3 - 7x - 6") + ' とおく</div></div>';
    findHTML += '<div class="step" style="animation-delay:0.1s"><div class="label">定数項の約数 ' + T("\\pm 1, \\pm 2, \\pm 3, \\pm 6") + ' を試す</div></div>';
    findHTML += '<div class="step" style="animation-delay:0.2s"><div class="label">' + T("P(1) = 1 - 7 - 6 = -12 \\neq 0") + '</div></div>';
    findHTML += '<div class="step" style="animation-delay:0.3s"><div class="label">' + T("P(-1) = -1 + 7 - 6 = 0") + ' <span class="result-badge yes">因数 ' + T("(x+1)") + ' を発見</span></div></div>';
    document.getElementById('find-factor').innerHTML = findHTML;

    // Step 3: final result
    var finalHTML = '';
    finalHTML += '<div class="step" style="animation-delay:0s"><div class="formula-line">' + T("x^3 - 7x - 6 = (x+1)(x^2 - x - 6)") + '</div></div>';
    finalHTML += '<div class="step current" style="animation-delay:0.15s"><div class="label">' + T("x^2 - x - 6") + ' をさらに因数分解する</div>';
    finalHTML += '<div class="formula-line">' + T("= (x+1)(x+2)(x-3)") + '</div></div>';
    document.getElementById('final-result').innerHTML = finalHTML;

    renderDivision();

    document.getElementById('prev').addEventListener('click', function() {
      if (curDiv > 0) { curDiv--; renderDivision(); }
    });
    document.getElementById('next').addEventListener('click', function() {
      if (curDiv < divSteps.length - 1) { curDiv++; renderDivision(); }
    });
  }

  if (window.katex) init();
  else window.addEventListener("DOMContentLoaded", function() {
    if (window.katex) init();
    else { var w = setInterval(function() { if (window.katex) { clearInterval(w); init(); } }, 30); }
  });
</script>
</body>
</html>
