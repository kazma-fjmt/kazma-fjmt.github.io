<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>複素数の導入</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" integrity="sha384-nB0miv6/jRmo5UMMR1wu3Gz6NLsoTkbqJghGIsx//Rlm+ZU03BU6SQNC66uf4l5+" crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" integrity="sha384-7zkQWkzuo3B5mTepMUcHkMB5jZaolc2xDwL6VFqjFALcbeS9Ggm/Yr2r3Dy4lfFg" crossorigin="anonymous"></script>
<style>
  :root { --bg:#fafafa; --fg:#333; --muted:#888; --accent:#2a6df4; }
  * { box-sizing:border-box; }
  html,body { margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Yu Gothic",sans-serif;background:var(--bg);color:var(--fg);line-height:1.7;-webkit-text-size-adjust:100%; }
  main { max-width:800px;margin:0 auto;padding:2.5rem 1.5rem 4rem; }
  h1 { font-size:1.5rem;margin:0 0 .25rem; }
  .subtitle { color:var(--muted);font-size:.9rem;margin:0 0 1.5rem; }
  h2 { font-size:1.1rem;margin:2.25rem 0 .75rem;border-left:4px solid var(--accent);padding-left:.6rem; }
  .card { background:#fff;border:1px solid #e3e3e3;border-radius:10px;padding:1rem 1.25rem;margin:0 0 1rem; }
  .def-grid { display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin:1rem 0; }
  @media(max-width:500px){ .def-grid { grid-template-columns:1fr; } }
  .def-item { background:#f0f5ff;border-radius:8px;padding:.75rem 1rem; }
  .def-item .label { color:var(--muted);font-size:.8rem;margin-bottom:.3rem; }
  .def-item .val { font-size:1rem; }
  /* SVG diagram */
  .diagram-wrap { display:flex;justify-content:center;margin:1.5rem 0; }
  svg.numdiag { width:100%;max-width:520px;height:340px; }
  .numdiag rect { rx:12;ry:12; }
  @keyframes fadeInRect { from{opacity:0;transform:scale(.93)} to{opacity:1;transform:scale(1)} }
  .nr1 { fill:#e8f4fd;stroke:#5aacf5;stroke-width:2; animation:fadeInRect .5s ease-out .1s both; }
  .nr2 { fill:#e8fdf0;stroke:#4fd47e;stroke-width:2; animation:fadeInRect .5s ease-out .5s both; }
  .nr3 { fill:#fdf8e8;stroke:#f5c842;stroke-width:2; animation:fadeInRect .5s ease-out .9s both; }
  .nr4 { fill:#fdf0e8;stroke:#f5924e;stroke-width:2; animation:fadeInRect .5s ease-out 1.3s both; }
  .nr5 { fill:#f5e8fd;stroke:#b95af5;stroke-width:2; animation:fadeInRect .5s ease-out 1.7s both; }
  .nlabel { font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:13px;font-weight:700; animation:fadeInRect .5s ease-out .1s both; }
  .nl1 { fill:#2a7fd4;animation-delay:.1s; }
  .nl2 { fill:#1a9a4e;animation-delay:.5s; }
  .nl3 { fill:#b8960a;animation-delay:.9s; }
  .nl4 { fill:#c05a10;animation-delay:1.3s; }
  .nl5 { fill:#7a1ab5;animation-delay:1.7s; }
  @keyframes popIn { from{opacity:0;r:0} to{opacity:1;r:6} }
  .dot-i { fill:#b95af5;animation:popIn .4s ease-out 2.1s both; }
  .dot-c { fill:#2a6df4;animation:popIn .4s ease-out 2.4s both; }
  .dot-label { font-size:12px;font-weight:700;animation:fadeInRect .4s ease-out 2.1s both; }
  .walkthrough { background:#fff;border:1px solid #e3e3e3;border-radius:10px;padding:.75rem 1.25rem;margin:0 0 .75rem;min-height:9rem;overflow-x:auto; }
  .step { padding:.75rem .25rem;border-bottom:1px dashed #eee; }
  .step:last-child { border-bottom:none; }
  .step.current { background:#f0f5ff;border-radius:8px;padding:.75rem;margin:.25rem -.5rem;animation:stepIn .3s ease-out; }
  @keyframes stepIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .step.current.result-step { animation:stepIn .3s ease-out,pulse .9s ease-out .35s both; }
  @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(42,109,244,.45)} 70%{box-shadow:0 0 0 14px rgba(42,109,244,0)} 100%{box-shadow:0 0 0 0 rgba(42,109,244,0)} }
  .step .label { color:var(--muted);font-size:.8rem;margin-bottom:.2rem; }
  .step .formula-line { overflow-x:auto; }
  .step .formula-line .katex { font-size:1.15rem; }
  .step.current .formula-line .katex { font-size:1.28rem; }
  .controls-row { display:flex;align-items:center;justify-content:space-between;gap:.75rem;margin:1rem 0 0; }
  .btn { appearance:none;border:1px solid #d4dbeb;background:#fff;color:var(--accent);font-size:1rem;font-weight:600;padding:.85rem 1.2rem;border-radius:10px;cursor:pointer;min-height:48px;min-width:100px;font-family:inherit;user-select:none; }
  .btn.primary { background:var(--accent);color:#fff;border-color:var(--accent); }
  .btn:disabled { opacity:.3;cursor:not-allowed; }
  .btn:active:not(:disabled) { transform:scale(.97); }
  .step-counter { color:var(--muted);font-size:.9rem;text-align:center;flex:1; }
</style>
</head>
<body>
<main>
  <h1>複素数の導入</h1>
  <p class="subtitle">虚数単位・複素数の定義・数の体系</p>

  <h2>虚数単位 <span id="i-def"></span></h2>
  <div class="card">
    <p>方程式 <span id="x2eq"></span> は実数の範囲では解をもたない。<br>
    そこで，この方程式の解となる新しい数 <strong>虚数単位（きょすうたんい）</strong> <span id="i-name"></span> を定義する。</p>
    <div style="text-align:center;margin:.75rem 0;font-size:1.1rem;" id="i-def2"></div>
  </div>

  <h2>複素数の定義</h2>
  <div class="card">
    <p><span id="a-bi"></span> の形に表された数を <strong>複素数（ふくそすう）</strong> という。</p>
    <div class="def-grid">
      <div class="def-item"><div class="label">実部（real part）</div><div class="val" id="re-part"></div></div>
      <div class="def-item"><div class="label">虚部（imaginary part）</div><div class="val" id="im-part"></div></div>
      <div class="def-item"><div class="label">実数</div><div class="val" id="real-num"></div></div>
      <div class="def-item"><div class="label">純虚数（じゅんきょすう）</div><div class="val" id="pure-im"></div></div>
    </div>
  </div>

  <h2>数の体系（順に広がる）</h2>
  <div class="diagram-wrap">
    <svg class="numdiag" viewBox="0 0 520 340" aria-label="数の体系図">
      <rect class="nr5" x="5" y="5" width="510" height="330" rx="12" ry="12"/>
      <rect class="nr4" x="25" y="25" width="390" height="290" rx="12" ry="12"/>
      <rect class="nr3" x="45" y="45" width="300" height="250" rx="12" ry="12"/>
      <rect class="nr2" x="65" y="65" width="210" height="210" rx="12" ry="12"/>
      <rect class="nr1" x="85" y="85" width="120" height="170" rx="12" ry="12"/>
      <!-- labels -->
      <text class="nlabel nl1" x="145" y="108">自然数</text>
      <text class="nlabel nl1" x="92" y="125">1, 2, 3, …</text>
      <text class="nlabel nl2" x="80" y="260">整数</text>
      <text class="nlabel nl2" x="80" y="278">…, -2, -1, 0</text>
      <text class="nlabel nl3" x="50" y="290">有理数</text>
      <text class="nlabel nl4" x="30" y="308">実数 √2, π, …</text>
      <text class="nlabel nl5" x="420" y="308">複素数</text>
      <!-- dots -->
      <circle class="dot-i" cx="440" cy="170" r="6"/>
      <text class="dot-label" x="450" y="175" fill="#7a1ab5">i</text>
      <circle class="dot-c" cx="460" cy="220" r="6"/>
      <text class="dot-label" x="470" y="225" fill="#2a6df4">2+3i</text>
    </svg>
  </div>

  <h2>ステップで確認</h2>
  <div class="walkthrough" id="walkthrough"></div>
  <div class="controls-row">
    <button class="btn" id="prev">◀ 前へ</button>
    <div class="step-counter">ステップ <span id="step-cur"></span> / <span id="step-tot"></span></div>
    <button class="btn primary" id="next">次へ ▶</button>
  </div>
</main>
<script>
  const T=l=>katex.renderToString(l,{throwOnError:false});
  const tex=(l,el)=>katex.render(l,el,{throwOnError:false});
  let steps=[], cur=0;

  function render(){
    const root=document.getElementById('walkthrough');
    let html='';
    for(let i=0;i<=cur;i++){
      const s=steps[i];
      const isCur=i===cur, isRes=s.type==='result';
      html+=`<div class="step${isCur?' current':''}${isCur&&isRes?' result-step':''}">
        <div class="label">${s.title}</div>
        <div class="formula-line">${T(s.formula)}</div>
      </div>`;
    }
    root.innerHTML=html;
    document.getElementById('step-cur').textContent=String(cur+1);
    document.getElementById('step-tot').textContent=String(steps.length);
    document.getElementById('prev').disabled=cur===0;
    document.getElementById('next').disabled=cur===steps.length-1;
    root.lastElementChild?.scrollIntoView({block:'nearest',behavior:'smooth'});
  }

  function init(){
    // Inline definitions
    tex('i^2 = -1', document.getElementById('i-def'));
    tex('x^2 = -1', document.getElementById('x2eq'));
    tex('i', document.getElementById('i-name'));
    tex('i^2 = -1', document.getElementById('i-def2'));
    tex('a + bi', document.getElementById('a-bi'));
    tex('a \\quad (a,b \\in \\mathbb{R})', document.getElementById('re-part'));
    tex('b \\quad (a,b \\in \\mathbb{R})', document.getElementById('im-part'));
    tex('b = 0 \\text{ のとき実数}', document.getElementById('real-num'));
    tex('a=0,\\; b\\neq 0 \\text{ のとき純虚数}', document.getElementById('pure-im'));

    steps=[
      {title:'虚数単位の定義', formula:'i^2 = -1', type:'def'},
      {title:'複素数の一般形', formula:'z = a + bi \\quad (a,b \\in \\mathbb{R})', type:'def'},
      {title:'実部と虚部', formula:'\\operatorname{Re}(a+bi)=a,\\quad \\operatorname{Im}(a+bi)=b', type:'def'},
      {title:'実数は複素数の特別な場合', formula:'b=0 \\Rightarrow a+0i = a \\text{（実数）}', type:'def'},
      {title:'純虚数の例', formula:'a=0,\\;b\\neq 0 \\Rightarrow bi \\text{（純虚数）}\\quad 例: 3i,\\; -\\tfrac{1}{2}i', type:'def'},
      {title:'具体例：複素数 2+3i', formula:'z = 2+3i,\\quad \\operatorname{Re}(z)=2,\\quad \\operatorname{Im}(z)=3', type:'result'},
    ];

    document.getElementById('prev').addEventListener('click',()=>{if(cur>0){cur--;render();}});
    document.getElementById('next').addEventListener('click',()=>{if(cur<steps.length-1){cur++;render();}});
    render();
  }

  if(window.katex) init();
  else document.addEventListener('DOMContentLoaded',()=>{
    if(window.katex) init();
    else { const w=setInterval(()=>{if(window.katex){clearInterval(w);init();}},30); }
  });
</script>
</body>
</html>
