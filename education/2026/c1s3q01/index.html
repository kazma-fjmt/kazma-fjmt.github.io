<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>多項式 P(x) と値の代入</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" integrity="sha384-nB0miv6/jRmo5UMMR1wu3Gz6NLsoTkbqJghGIsx//Rlm+ZU03BU6SQNC66uf4l5+" crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" integrity="sha384-7zkQWkzuo3B5mTepMUcHkMB5jZaolc2xDwL6VFqjFALcbeS9Ggm/Yr2r3Dy4lfFg" crossorigin="anonymous"></script>
<style>
  :root {
    --bg: #fafafa; --fg: #333; --muted: #888;
    --accent: #2a6df4; --c-a: #d9534f; --c-b: #2a6df4;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic", sans-serif;
    background: var(--bg); color: var(--fg); line-height: 1.7;
    -webkit-text-size-adjust: 100%;
  }
  main { max-width: 800px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }
  h1 { font-size: 1.5rem; margin: 0 0 .25rem; }
  .subtitle { color: var(--muted); font-size: .9rem; margin: 0 0 1.5rem; }
  h2 {
    font-size: 1.15rem; margin: 2.25rem 0 .75rem;
    border-left: 4px solid var(--accent); padding-left: .6rem;
  }
  p { margin: .75rem 0; }

  .formula {
    background: #fff; border: 1px solid #e3e3e3; border-radius: 10px;
    padding: 1rem; text-align: center; overflow-x: auto;
  }
  .formula .katex { font-size: 1.35rem; }

  .tabs { display: flex; gap: .5rem; margin: .75rem 0 1rem; flex-wrap: wrap; }
  .tab {
    flex: 1 1 200px; appearance: none; background: #fff;
    border: 1.5px solid #d4dbeb; color: var(--fg); border-radius: 10px;
    padding: 1rem .75rem; font-size: 1rem; font-family: inherit;
    cursor: pointer; min-height: 56px; user-select: none;
    transition: border-color .15s ease, background .15s ease;
  }
  .tab.active { border-color: var(--accent); background: #eef4ff; }
  .tab:active { transform: scale(.98); }
  .tab .katex { font-size: 1.15rem; }

  .walkthrough {
    background: #fff; border: 1px solid #e3e3e3; border-radius: 10px;
    padding: .75rem 1.25rem; margin: 0 0 .75rem; min-height: 9rem; overflow-x: auto;
  }
  .step {
    padding: .75rem .25rem; border-bottom: 1px dashed #eee;
    animation: fadeIn .35s ease;
  }
  .step:last-child { border-bottom: none; }
  .step.current { background: #f0f5ff; border-radius: 8px; padding: .75rem; margin: .25rem -.5rem; border-bottom: none; }
  .step .label { color: var(--muted); font-size: .8rem; margin-bottom: .25rem; }
  .step .formula-line { text-align: left; overflow-x: auto; }
  .step .formula-line .katex { font-size: 1.2rem; }
  .step.current .formula-line .katex { font-size: 1.35rem; }

  .controls-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: .75rem; margin: 1rem 0 0;
  }
  .btn {
    appearance: none; border: 1px solid #d4dbeb; background: #fff;
    color: var(--accent); font-size: 1rem; font-weight: 600;
    padding: .85rem 1.2rem; border-radius: 10px; cursor: pointer;
    min-height: 48px; min-width: 110px; font-family: inherit; user-select: none;
  }
  .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn:disabled { opacity: .3; cursor: not-allowed; }
  .btn:active:not(:disabled) { transform: scale(.97); }
  .step-counter { color: var(--muted); font-size: .9rem; text-align: center; flex: 1; }

  .result-box {
    background: #e8f5e9; border: 2px solid #4caf50; border-radius: 10px;
    padding: 1rem; text-align: center; margin: 1rem 0;
    animation: pulse .5s ease;
  }
  .result-box .katex { font-size: 1.4rem; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse { 0%,100%{ transform: scale(1); } 50%{ transform: scale(1.03); } }
</style>
</head>
<body>
<main>
  <h1>多項式と値の代入</h1>
  <p class="subtitle" id="intro"></p>

  <h2>記法の説明</h2>
  <div class="formula" id="notation"></div>
  <p id="notation-desc"></p>

  <h2>例題</h2>
  <p class="subtitle">例題をタップで切り替え、「次へ」で1ステップずつ進みます。</p>
  <div class="tabs" id="tabs"></div>

  <div class="walkthrough" id="walkthrough"></div>
  <div class="controls-row">
    <button class="btn" id="prev">&larr; 戻る</button>
    <div class="step-counter">ステップ <span id="step-cur"></span> / <span id="step-tot"></span></div>
    <button class="btn primary" id="next">次へ &rarr;</button>
  </div>
</main>

<script>
const C_A = "#d9534f";
const C_B = "#2a6df4";

function tex(latex, target, displayMode) {
  katex.render(latex, target, { throwOnError: false, displayMode: !!displayMode });
}
function T(l) { return katex.renderToString(l, { throwOnError: false }); }

let examples = [];
let curEx = 0, curStep = 0;

function renderWalkthrough() {
  const root = document.getElementById('walkthrough');
  const ex = examples[curEx];
  let html = '';
  for (let i = 0; i <= curStep; i++) {
    const s = ex.steps[i];
    const isCurrent = i === curStep;
    html += `<div class="step ${isCurrent ? 'current' : ''}">
      <div class="label">${s.title}</div>
      <div class="formula-line">${T(s.tex)}</div>
    </div>`;
  }
  root.innerHTML = html;
  tex(String(curStep + 1), document.getElementById('step-cur'));
  tex(String(ex.steps.length), document.getElementById('step-tot'));
  document.getElementById('prev').disabled = curStep === 0;
  document.getElementById('next').disabled = curStep === ex.steps.length - 1;
}

function selectExample(idx) {
  curEx = idx; curStep = 0;
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', parseInt(t.dataset.idx, 10) === idx);
  });
  renderWalkthrough();
}

function init() {
  document.getElementById('intro').innerHTML =
    `多項式を ${T('P(x)')} のように表し、${T('x')} に値を代入して計算する方法を学びましょう。`;

  tex('P(x) = x^3 - 2x^2 + 3', document.getElementById('notation'), true);
  document.getElementById('notation-desc').innerHTML =
    `${T('x')} についての多項式を ${T('P(x)')} と書きます。${T('x')} に ${T('2')} を代入した値は ${T('P(2)')} のように表します。`;

  examples = [
    {
      label: 'P(2)',
      steps: [
        { title: '多項式を確認する',
          tex: `P(x) = x^3 - 2x^2 + 3` },
        { title: `${T('x')} に ${T('\\textcolor{' + C_A + '}{2}')} を代入する`,
          tex: `P(\\textcolor{${C_A}}{2}) = \\textcolor{${C_A}}{2}^3 - 2 \\cdot \\textcolor{${C_A}}{2}^2 + 3` },
        { title: 'べき乗を計算する',
          tex: `P(2) = 8 - 2 \\cdot 4 + 3` },
        { title: '掛け算を計算する',
          tex: `P(2) = 8 - 8 + 3` },
        { title: '最終結果',
          tex: `\\boxed{P(2) = 3}` }
      ]
    },
    {
      label: 'P(-1)',
      steps: [
        { title: '多項式を確認する',
          tex: `P(x) = x^3 - 2x^2 + 3` },
        { title: `${T('x')} に ${T('\\textcolor{' + C_A + '}{-1}')} を代入する`,
          tex: `P(\\textcolor{${C_A}}{-1}) = (\\textcolor{${C_A}}{-1})^3 - 2 \\cdot (\\textcolor{${C_A}}{-1})^2 + 3` },
        { title: 'べき乗を計算する',
          tex: `P(-1) = -1 - 2 \\cdot 1 + 3` },
        { title: '掛け算を計算する',
          tex: `P(-1) = -1 - 2 + 3` },
        { title: '最終結果',
          tex: `\\boxed{P(-1) = 0}` }
      ]
    },
    {
      label: 'P(3)',
      steps: [
        { title: '多項式を確認する',
          tex: `P(x) = x^3 - 2x^2 + 3` },
        { title: `${T('x')} に ${T('\\textcolor{' + C_A + '}{3}')} を代入する`,
          tex: `P(\\textcolor{${C_A}}{3}) = \\textcolor{${C_A}}{3}^3 - 2 \\cdot \\textcolor{${C_A}}{3}^2 + 3` },
        { title: 'べき乗を計算する',
          tex: `P(3) = 27 - 2 \\cdot 9 + 3` },
        { title: '掛け算を計算する',
          tex: `P(3) = 27 - 18 + 3` },
        { title: '最終結果',
          tex: `\\boxed{P(3) = 12}` }
      ]
    }
  ];

  // Build tabs
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = '';
  examples.forEach((ex, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (i === 0 ? ' active' : '');
    btn.dataset.idx = i;
    tex(ex.label, btn);
    btn.addEventListener('click', () => selectExample(i));
    tabsEl.appendChild(btn);
  });

  document.getElementById('prev').addEventListener('click', () => {
    if (curStep > 0) { curStep--; renderWalkthrough(); }
  });
  document.getElementById('next').addEventListener('click', () => {
    if (curStep < examples[curEx].steps.length - 1) { curStep++; renderWalkthrough(); }
  });

  renderWalkthrough();
}

if (window.katex) init();
else window.addEventListener("DOMContentLoaded", () => {
  if (window.katex) init();
  else { const w = setInterval(() => { if (window.katex) { clearInterval(w); init(); } }, 30); }
});
</script>
</body>
</html>
