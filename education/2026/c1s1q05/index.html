<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>3次式の因数分解</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" integrity="sha384-nB0miv6/jRmo5UMMR1wu3Gz6NLsoTkbqJghGIsx//Rlm+ZU03BU6SQNC66uf4l5+" crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" integrity="sha384-7zkQWkzuo3B5mTepMUcHkMB5jZaolc2xDwL6VFqjFALcbeS9Ggm/Yr2r3Dy4lfFg" crossorigin="anonymous"></script>
<style>
  :root { --bg:#fafafa; --fg:#333; --muted:#888; --accent:#2a6df4; }
  * { box-sizing:border-box; }
  html,body { margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Yu Gothic",sans-serif;background:var(--bg);color:var(--fg);line-height:1.7;-webkit-text-size-adjust:100%; }
  main { max-width:800px;margin:0 auto;padding:2.5rem 1.5rem 4rem; }
  h1 { font-size:1.5rem;margin:0 0 .25rem; }
  .subtitle { color:var(--muted);font-size:.9rem;margin:0 0 1.5rem; }
  h2 { font-size:1.1rem;margin:2.25rem 0 .75rem;border-left:4px solid var(--accent);padding-left:.6rem; }
  .formulas { display:grid;gap:.6rem; }
  .formula-box { background:#fff;border:1px solid #e3e3e3;border-radius:10px;padding:1rem 1.25rem;overflow-x:auto;text-align:center; }
  .formula-box .katex { font-size:1.25rem; }
  .note { font-size:.85rem;color:var(--muted);text-align:center;margin-top:.4rem; }
  .tabs { display:flex;gap:.5rem;margin:.75rem 0 1rem;flex-wrap:wrap; }
  .tab { flex:1 1 200px;appearance:none;background:#fff;border:1.5px solid #d4dbeb;color:var(--fg);border-radius:10px;padding:.85rem .75rem;font-size:.9rem;font-family:inherit;cursor:pointer;min-height:56px;user-select:none;transition:border-color .15s,background .15s;text-align:center; }
  .tab.active { border-color:var(--accent);background:#eef4ff; }
  .tab:active { transform:scale(.98); }
  .tab .katex { font-size:1rem; }
  .walkthrough { background:#fff;border:1px solid #e3e3e3;border-radius:10px;padding:.75rem 1.25rem;margin:0 0 .75rem;min-height:9rem;overflow-x:auto; }
  .step { padding:.75rem .25rem;border-bottom:1px dashed #eee; }
  .step:last-child { border-bottom:none; }
  .step.current { background:#f0f5ff;border-radius:8px;padding:.75rem;margin:.25rem -.5rem;animation:stepIn .3s ease-out; }
  @keyframes stepIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .step.current.result-step { animation:stepIn .3s ease-out,pulse .9s ease-out .35s both; }
  @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(42,109,244,.45)} 70%{box-shadow:0 0 0 14px rgba(42,109,244,0)} 100%{box-shadow:0 0 0 0 rgba(42,109,244,0)} }
  .step .label { color:var(--muted);font-size:.8rem;margin-bottom:.2rem; }
  .step .formula-line { overflow-x:auto; }
  .step .formula-line .katex { font-size:1.2rem; }
  .step.current .formula-line .katex { font-size:1.35rem; }
  .controls-row { display:flex;align-items:center;justify-content:space-between;gap:.75rem;margin:1rem 0 0; }
  .btn { appearance:none;border:1px solid #d4dbeb;background:#fff;color:var(--accent);font-size:1rem;font-weight:600;padding:.85rem 1.2rem;border-radius:10px;cursor:pointer;min-height:48px;min-width:100px;font-family:inherit;user-select:none; }
  .btn.primary { background:var(--accent);color:#fff;border-color:var(--accent); }
  .btn:disabled { opacity:.3;cursor:not-allowed; }
  .btn:active:not(:disabled) { transform:scale(.97); }
  .step-counter { color:var(--muted);font-size:.9rem;text-align:center;flex:1; }
  .step-counter .katex { font-size:1rem;color:var(--fg);font-weight:600; }
</style>
</head>
<body>
<main>
  <h1>3次式の因数分解</h1>
  <p class="subtitle">乗法公式を逆向きに使うと、因数分解の公式になります。</p>

  <h2>因数分解の公式</h2>
  <div class="formulas">
    <div class="formula-box" id="f5"></div>
    <div class="formula-box" id="f6"></div>
  </div>
  <p class="note">展開公式3・4の左辺と右辺を入れ替えたものです。</p>

  <h2>例題</h2>
  <p class="subtitle">タップで切り替え、「次へ」で1ステップずつ進みます。</p>
  <div class="tabs" id="tabs">
    <button class="tab active" data-idx="0"></button>
    <button class="tab" data-idx="1"></button>
  </div>

  <div class="walkthrough" id="walkthrough"></div>
  <div class="controls-row">
    <button class="btn" id="prev">← 戻る</button>
    <div class="step-counter">ステップ <span id="step-cur"></span> / <span id="step-tot"></span></div>
    <button class="btn primary" id="next">次へ →</button>
  </div>
</main>
<script>
  const CA="#d9534f", CB="#2a6df4";
  const T=l=>katex.renderToString(l,{throwOnError:false});
  const tex=(l,el)=>katex.render(l,el,{throwOnError:false});

  const F5=`\\textcolor{${CA}}{a}^3+\\textcolor{${CB}}{b}^3=(\\textcolor{${CA}}{a}+\\textcolor{${CB}}{b})(\\textcolor{${CA}}{a}^2-\\textcolor{${CA}}{a}\\textcolor{${CB}}{b}+\\textcolor{${CB}}{b}^2)`;
  const F6=`\\textcolor{${CA}}{a}^3-\\textcolor{${CB}}{b}^3=(\\textcolor{${CA}}{a}-\\textcolor{${CB}}{b})(\\textcolor{${CA}}{a}^2+\\textcolor{${CA}}{a}\\textcolor{${CB}}{b}+\\textcolor{${CB}}{b}^2)`;

  const examples=[
    {
      label:"x^3+125",
      steps:[
        {title:"因数分解する式", formula:"x^3+125"},
        {title:"使う公式を確認する", formula:F5},
        {titleParts:[{tex:`\\textcolor{${CA}}{a}`}," と ",{tex:`\\textcolor{${CB}}{b}`}," を決める"],
          formula:`x^3+125=\\textcolor{${CA}}{x}^3+\\textcolor{${CB}}{5}^3\\quad\\Rightarrow\\quad\\textcolor{${CA}}{a}=\\textcolor{${CA}}{x},\\;\\textcolor{${CB}}{b}=\\textcolor{${CB}}{5}`},
        {title:"公式に当てはめる",
          formula:`=(\\textcolor{${CA}}{x}+\\textcolor{${CB}}{5})(\\textcolor{${CA}}{x}^2-\\textcolor{${CA}}{x}\\cdot\\textcolor{${CB}}{5}+\\textcolor{${CB}}{5}^2)`},
        {title:"因数分解の完成", formula:"\\phantom{x^3+125}=(x+5)(x^2-5x+25)", type:"result"}
      ]
    },
    {
      label:"27x^3-8y^3",
      steps:[
        {title:"因数分解する式", formula:"27x^3-8y^3"},
        {title:"使う公式を確認する", formula:F6},
        {titleParts:[{tex:`\\textcolor{${CA}}{a}`}," と ",{tex:`\\textcolor{${CB}}{b}`}," を決める"],
          formula:`27x^3-8y^3=(\\textcolor{${CA}}{3x})^3-(\\textcolor{${CB}}{2y})^3\\quad\\Rightarrow\\quad\\textcolor{${CA}}{a}=\\textcolor{${CA}}{3x},\\;\\textcolor{${CB}}{b}=\\textcolor{${CB}}{2y}`},
        {title:"公式に当てはめる",
          formula:`=(\\textcolor{${CA}}{3x}-\\textcolor{${CB}}{2y})\\{(\\textcolor{${CA}}{3x})^2+\\textcolor{${CA}}{3x}\\cdot\\textcolor{${CB}}{2y}+(\\textcolor{${CB}}{2y})^2\\}`},
        {title:"因数分解の完成", formula:"\\phantom{27x^3-8y^3}=(3x-2y)(9x^2+6xy+4y^2)", type:"result"}
      ]
    }
  ];

  let curEx=0, curStep=0;
  function buildLabel(parts){return parts.map(p=>typeof p==='string'?p:T(p.tex)).join('');}

  function render(){
    const root=document.getElementById('walkthrough');
    const ex=examples[curEx];
    let html='';
    for(let i=0;i<=curStep;i++){
      const s=ex.steps[i];
      const isCur=i===curStep;
      const isRes=s.type==='result';
      const label=s.titleParts?buildLabel(s.titleParts):s.title;
      html+=`<div class="step${isCur?' current':''}${isCur&&isRes?' result-step':''}">
        <div class="label">${label}</div>
        <div class="formula-line">${T(s.formula)}</div>
      </div>`;
    }
    root.innerHTML=html;
    tex(String(curStep+1),document.getElementById('step-cur'));
    tex(String(ex.steps.length),document.getElementById('step-tot'));
    document.getElementById('prev').disabled=curStep===0;
    document.getElementById('next').disabled=curStep===ex.steps.length-1;
    const last=root.lastElementChild;
    if(last) last.scrollIntoView({block:'nearest',behavior:'smooth'});
  }

  function selectEx(idx){
    curEx=idx; curStep=0;
    document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',parseInt(t.dataset.idx)===idx));
    render();
  }

  function init(){
    tex(F5,document.getElementById('f5'));
    tex(F6,document.getElementById('f6'));
    document.querySelectorAll('.tab').forEach(tab=>{
      const idx=parseInt(tab.dataset.idx);
      tex(examples[idx].label,tab);
      tab.addEventListener('click',()=>selectEx(idx));
    });
    document.getElementById('prev').addEventListener('click',()=>{if(curStep>0){curStep--;render();}});
    document.getElementById('next').addEventListener('click',()=>{if(curStep<examples[curEx].steps.length-1){curStep++;render();}});
    render();
  }

  if(window.katex) init();
  else document.addEventListener('DOMContentLoaded',()=>{
    if(window.katex) init();
    else { const w=setInterval(()=>{if(window.katex){clearInterval(w);init();}},30); }
  });
</script>
</body>
</html>
