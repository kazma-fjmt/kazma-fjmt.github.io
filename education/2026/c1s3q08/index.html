<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>高次方程式の解法 — x³=1</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" integrity="sha384-nB0miv6/jRmo5UMMR1wu3Gz6NLsoTkbqJghGIsx//Rlm+ZU03BU6SQNC66uf4l5+" crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" integrity="sha384-7zkQWkzuo3B5mTepMUcHkMB5jZaolc2xDwL6VFqjFALcbeS9Ggm/Yr2r3Dy4lfFg" crossorigin="anonymous"></script>
<style>
  :root { --bg: #fafafa; --fg: #333; --muted: #888; --accent: #2a6df4; --success: #27ae60; }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic", sans-serif;
    background: var(--bg); color: var(--fg); line-height: 1.7;
    -webkit-text-size-adjust: 100%;
  }
  main { max-width: 800px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }
  h1 { font-size: 1.5rem; margin: 0 0 .25rem; }
  .subtitle { color: var(--muted); font-size: .9rem; margin: 0 0 1.5rem; }
  h2 { font-size: 1.15rem; margin: 2.25rem 0 .75rem; border-left: 4px solid var(--accent); padding-left: .6rem; }
  p { margin: .75rem 0; }

  .card {
    background: #fff; border: 1px solid #e3e3e3;
    border-radius: 10px; padding: 1rem 1.25rem; margin: .75rem 0; overflow-x: auto;
  }
  .step {
    padding: .75rem .25rem; border-bottom: 1px dashed #eee;
    opacity: 0; transform: translateY(12px);
    animation: fadeSlideIn .4s ease forwards;
  }
  .step:last-child { border-bottom: none; }
  .step.current { background: #f0f5ff; border-radius: 8px; padding: .75rem; margin: .25rem -.5rem; border-bottom: none; }
  .step .label { color: var(--muted); font-size: .8rem; margin-bottom: .25rem; }
  .step .formula-line { text-align: left; overflow-x: auto; }
  .step .formula-line .katex { font-size: 1.2rem; }
  .step.current .formula-line .katex { font-size: 1.35rem; }

  @keyframes fadeSlideIn { to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.03); } }

  .result-badge {
    display: inline-block; padding: .35rem .8rem; border-radius: 8px;
    font-weight: 700; font-size: .95rem; margin-top: .5rem;
    animation: pulse .5s ease; background: #e8f8ef; color: var(--success);
  }

  .controls-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: .75rem; margin: 1rem 0 0;
  }
  .btn {
    appearance: none; border: 1px solid #d4dbeb; background: #fff;
    color: var(--accent); font-size: 1rem; font-weight: 600;
    padding: .85rem 1.2rem; border-radius: 10px; cursor: pointer;
    min-height: 48px; min-width: 110px; font-family: inherit; user-select: none;
  }
  .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn:disabled { opacity: .3; cursor: not-allowed; }
  .btn:active:not(:disabled) { transform: scale(.97); }
  .step-counter { color: var(--muted); font-size: .9rem; text-align: center; flex: 1; }

  /* Complex plane */
  .canvas-wrap {
    position: relative; margin: 1rem auto; width: 100%; max-width: 400px;
  }
  canvas { display: block; width: 100%; height: auto; border-radius: 10px; background: #fff; border: 1px solid #e3e3e3; }
  .canvas-labels { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
  .canvas-labels span { position: absolute; font-size: .75rem; }
</style>
</head>
<body>
<main>
  <h1>高次方程式の解法</h1>
  <p class="subtitle">因数分解を用いて3次方程式を解きます。</p>

  <h2>例題3</h2>
  <p>方程式 <span id="problem"></span> を解け。</p>

  <div class="card" id="walkthrough"></div>
  <div class="controls-row">
    <button class="btn" id="prev">&larr; 戻る</button>
    <div class="step-counter">ステップ <span id="step-cur"></span> / <span id="step-tot"></span></div>
    <button class="btn primary" id="next">次へ &rarr;</button>
  </div>

  <h2>複素数平面上の解</h2>
  <p>3つの解を複素数平面に表示します。</p>
  <div class="canvas-wrap">
    <canvas id="cplane" width="400" height="400"></canvas>
  </div>
</main>

<script>
  function tex(latex, el, dm) { katex.render(latex, el, { throwOnError: false, displayMode: !!dm }); }
  function T(l) { return katex.renderToString(l, { throwOnError: false }); }

  var steps = [];
  var curStep = 0;

  function buildSteps() {
    steps = [
      { title: "方程式を整理する", tex: "x^3 = 1" },
      { title: "右辺を左辺に移項する", tex: "x^3 - 1 = 0" },
      { title: "左辺を因数分解する", tex: "(x - 1)(x^2 + x + 1) = 0" },
      { title: "各因数を0とおく", tex: "x - 1 = 0 \\quad \\text{または} \\quad x^2 + x + 1 = 0" },
      { title: "第1の解", tex: "x = 1" },
      { title: "2次方程式を解の公式で解く", tex: "x = \\frac{-1 \\pm \\sqrt{1 - 4}}{2} = \\frac{-1 \\pm \\sqrt{-3}}{2}" },
      { title: "解をまとめる", tex: "x = 1, \\quad \\frac{-1 \\pm \\sqrt{3}\\,i}{2}", badge: true }
    ];
  }

  function renderWalkthrough() {
    var root = document.getElementById('walkthrough');
    var html = '';
    for (var i = 0; i <= curStep; i++) {
      var s = steps[i];
      var isCur = i === curStep;
      html += '<div class="step ' + (isCur ? 'current' : '') + '" style="animation-delay:' + (i * 0.08) + 's">';
      html += '<div class="label">' + s.title + '</div>';
      html += '<div class="formula-line">' + T(s.tex) + '</div>';
      if (s.badge && isCur) html += '<div class="result-badge">解が求まりました</div>';
      html += '</div>';
    }
    root.innerHTML = html;
    tex(String(curStep + 1), document.getElementById('step-cur'));
    tex(String(steps.length), document.getElementById('step-tot'));
    document.getElementById('prev').disabled = curStep === 0;
    document.getElementById('next').disabled = curStep === steps.length - 1;
    // Animate plane when last step reached
    if (curStep === steps.length - 1 && !animStarted) startPlaneAnimation();
  }

  /* Complex plane animation */
  var animStarted = false;
  var animProgress = 0;
  var roots = [
    { re: 1, im: 0, label: "1" },
    { re: -0.5, im: Math.sqrt(3)/2, label: "\\frac{-1+\\sqrt{3}\\,i}{2}" },
    { re: -0.5, im: -Math.sqrt(3)/2, label: "\\frac{-1-\\sqrt{3}\\,i}{2}" }
  ];

  function drawPlane(progress) {
    var canvas = document.getElementById('cplane');
    var ctx = canvas.getContext('2d');
    var w = canvas.width, h = canvas.height;
    var cx = w / 2, cy = h / 2, scale = 140;
    ctx.clearRect(0, 0, w, h);

    // Grid
    ctx.strokeStyle = '#e8e8e8'; ctx.lineWidth = 1;
    for (var g = -2; g <= 2; g++) {
      ctx.beginPath(); ctx.moveTo(cx + g * scale, 0); ctx.lineTo(cx + g * scale, h); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, cy + g * scale); ctx.lineTo(w, cy + g * scale); ctx.stroke();
    }

    // Axes
    ctx.strokeStyle = '#aaa'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(w, cy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, h); ctx.stroke();

    // Unit circle
    ctx.strokeStyle = '#ccc'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(cx, cy, scale, 0, Math.PI * 2); ctx.stroke();

    // Axis labels via KaTeX overlay are complex; use simple canvas text for Re/Im
    ctx.fillStyle = '#888'; ctx.font = '13px sans-serif';
    ctx.fillText('Re', w - 25, cy - 8);
    ctx.fillText('Im', cx + 8, 15);

    // Roots
    var colors = ['#2a6df4', '#d9534f', '#27ae60'];
    var pointsToDraw = Math.min(3, Math.floor(progress * 4));
    var dotScale = Math.min(1, (progress * 4 - Math.floor(progress * 4 - 0.001)) );

    for (var i = 0; i < 3; i++) {
      var r = roots[i];
      var px = cx + r.re * scale;
      var py = cy - r.im * scale;
      var appear = Math.min(1, Math.max(0, progress * 3 - i));
      if (appear <= 0) continue;

      // Dot
      ctx.globalAlpha = appear;
      ctx.fillStyle = colors[i];
      ctx.beginPath(); ctx.arc(px, py, 7 * appear, 0, Math.PI * 2); ctx.fill();

      // Line from origin
      ctx.strokeStyle = colors[i]; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx + (px - cx) * appear, cy + (py - cy) * appear); ctx.stroke();

      // Label
      if (appear > 0.5) {
        ctx.fillStyle = colors[i]; ctx.font = 'bold 12px sans-serif';
        var lx = px + 10, ly = py - 12;
        if (r.im < 0) ly = py + 20;
        if (r.re > 0.5) lx = px + 12;
        // Simple text labels
        var labels = ['1', '(-1+√3i)/2', '(-1-√3i)/2'];
        ctx.fillText(labels[i], lx, ly);
      }
      ctx.globalAlpha = 1;
    }

    // Triangle connecting roots
    if (progress > 0.8) {
      var triAlpha = (progress - 0.8) / 0.2;
      ctx.globalAlpha = triAlpha * 0.3;
      ctx.fillStyle = '#2a6df4';
      ctx.beginPath();
      ctx.moveTo(cx + roots[0].re * scale, cy - roots[0].im * scale);
      ctx.lineTo(cx + roots[1].re * scale, cy - roots[1].im * scale);
      ctx.lineTo(cx + roots[2].re * scale, cy - roots[2].im * scale);
      ctx.closePath(); ctx.fill();
      ctx.globalAlpha = triAlpha;
      ctx.strokeStyle = '#2a6df4'; ctx.lineWidth = 2;
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
  }

  function startPlaneAnimation() {
    animStarted = true;
    animProgress = 0;
    var start = null;
    function frame(ts) {
      if (!start) start = ts;
      animProgress = Math.min(1, (ts - start) / 2000);
      drawPlane(animProgress);
      if (animProgress < 1) requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  }

  function init() {
    buildSteps();
    tex("x^3 = 1", document.getElementById('problem'));

    document.getElementById('prev').addEventListener('click', function() {
      if (curStep > 0) { curStep--; renderWalkthrough(); }
    });
    document.getElementById('next').addEventListener('click', function() {
      if (curStep < steps.length - 1) { curStep++; renderWalkthrough(); }
    });

    renderWalkthrough();
    drawPlane(0);
  }

  if (window.katex) init();
  else window.addEventListener("DOMContentLoaded", function() {
    if (window.katex) init();
    else { var w = setInterval(function() { if (window.katex) { clearInterval(w); init(); } }, 30); }
  });
</script>
</body>
</html>
