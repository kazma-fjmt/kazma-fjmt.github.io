<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>恒等式</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" integrity="sha384-nB0miv6/jRmo5UMMR1wu3Gz6NLsoTkbqJghGIsx//Rlm+ZU03BU6SQNC66uf4l5+" crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" integrity="sha384-7zkQWkzuo3B5mTepMUcHkMB5jZaolc2xDwL6VFqjFALcbeS9Ggm/Yr2r3Dy4lfFg" crossorigin="anonymous"></script>
<style>
  :root {
    --bg: #fafafa;
    --fg: #333;
    --muted: #888;
    --accent: #2a6df4;
    --c-a: #d9534f;
    --c-b: #2a6df4;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic", sans-serif;
    background: var(--bg); color: var(--fg);
    line-height: 1.7;
    -webkit-text-size-adjust: 100%;
  }
  main { max-width: 800px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }
  h1 { font-size: 1.5rem; margin: 0 0 .25rem; }
  .subtitle { color: var(--muted); font-size: .9rem; margin: 0 0 1.5rem; }
  h2 {
    font-size: 1.15rem; margin: 2.25rem 0 .75rem;
    border-left: 4px solid var(--accent); padding-left: .6rem;
  }
  p { margin: .75rem 0; }

  .formula-box {
    background: #fff; border: 1px solid #e3e3e3; border-radius: 10px;
    padding: 1rem 1.25rem; text-align: center; overflow-x: auto; margin: .75rem 0;
  }
  .formula-box .katex { font-size: 1.3rem; }

  .tabs {
    display: flex; gap: .5rem; margin: .75rem 0 1rem; flex-wrap: wrap;
  }
  .tab {
    flex: 1 1 200px; appearance: none; background: #fff;
    border: 1.5px solid #d4dbeb; color: var(--fg); border-radius: 10px;
    padding: 1rem .75rem; font-size: 1rem; font-family: inherit;
    cursor: pointer; min-height: 56px; user-select: none;
    transition: border-color .15s ease, background .15s ease;
  }
  .tab.active { border-color: var(--accent); background: #eef4ff; }
  .tab:active { transform: scale(.98); }

  .walkthrough {
    background: #fff; border: 1px solid #e3e3e3; border-radius: 10px;
    padding: .75rem 1.25rem; margin: 0 0 .75rem; min-height: 9rem; overflow-x: auto;
  }
  .step {
    padding: .75rem .25rem; border-bottom: 1px dashed #eee;
    transition: background .2s ease;
  }
  .step:last-child { border-bottom: none; }
  .step.current {
    background: #f0f5ff; border-radius: 8px; padding: .75rem;
    margin: .25rem -.5rem; border-bottom: none;
  }
  .step .label { color: var(--muted); font-size: .8rem; margin-bottom: .25rem; }
  .step .formula-line { text-align: left; overflow-x: auto; }
  .step .formula-line .katex { font-size: 1.2rem; }
  .step.current .formula-line .katex { font-size: 1.35rem; }

  .controls-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: .75rem; margin: 1rem 0 0;
  }
  .btn {
    appearance: none; border: 1px solid #d4dbeb; background: #fff;
    color: var(--accent); font-size: 1rem; font-weight: 600;
    padding: .85rem 1.2rem; border-radius: 10px; cursor: pointer;
    min-height: 48px; min-width: 110px; font-family: inherit; user-select: none;
  }
  .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn:disabled { opacity: .3; cursor: not-allowed; }
  .btn:active:not(:disabled) { transform: scale(.97); }
  .step-counter {
    color: var(--muted); font-size: .9rem; text-align: center; flex: 1;
  }

  .note {
    background: #fffbe6; border: 1px solid #f5e6a3; border-radius: 10px;
    padding: .75rem 1rem; margin: .75rem 0; font-size: .95rem;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .step { animation: fadeIn .3s ease; }
</style>
</head>
<body>
<main>
  <h1>恒等式</h1>
  <p class="subtitle">恒等式の定義と、係数比較法・数値代入法を学びましょう。</p>

  <h2>恒等式とは</h2>
  <p>等式の中の文字にどのような数を代入しても成り立つ等式を<strong>恒等式</strong>といいます。</p>
  <div class="formula-box" id="identity-example"></div>
  <p>乗法公式や因数分解の公式はすべて恒等式です。一方、特定の値でだけ成り立つ等式は<strong>方程式</strong>です。</p>

  <h2>多項式の恒等式の条件</h2>
  <div class="formula-box" id="condition-formula"></div>
  <p id="condition-text"></p>
  <div class="formula-box" id="condition-equiv"></div>

  <div class="note" id="note-zero"></div>

  <h2>例題1</h2>
  <div class="formula-box" id="example-problem"></div>
  <p>上の等式が恒等式となるように、定数の値を求めます。</p>

  <p class="subtitle">解法をタップで切り替え、「次へ」で1ステップずつ進みます。</p>
  <div class="tabs" id="tabs">
    <button class="tab active" data-idx="0">係数比較法</button>
    <button class="tab" data-idx="1">数値代入法</button>
  </div>

  <div class="walkthrough" id="walkthrough"></div>
  <div class="controls-row">
    <button class="btn" id="prev">← 戻る</button>
    <div class="step-counter">ステップ <span id="step-cur"></span> / <span id="step-tot"></span></div>
    <button class="btn primary" id="next">次へ →</button>
  </div>
</main>

<script>
  function tex(latex, el, displayMode) {
    katex.render(latex, el, { throwOnError: false, displayMode: !!displayMode });
  }
  function T(latex) {
    return katex.renderToString(latex, { throwOnError: false });
  }

  const methods = [
    // 係数比較法
    [
      { title: "左辺を展開・整理する", tex: "a(x+1)(x-1)+bx(x+1)+cx(x-1)" },
      { title: "各因数を展開", tex: "= a(x^2-1) + b(x^2+x) + c(x^2-x)" },
      { title: "同類項をまとめる", tex: "= (a+b+c)x^2 + (b-c)x + (-a)" },
      { title: "右辺と係数比較する", tex: "(a+b+c)x^2 + (b-c)x + (-a) = 0 \\cdot x^2 + 3x + (-1)" },
      { title: "連立方程式を立てる", tex: "\\begin{cases} a+b+c = 0 \\quad \\cdots \\textcircled{1} \\\\ b-c = 3 \\quad \\cdots \\textcircled{2} \\\\ -a = -1 \\quad \\cdots \\textcircled{3} \\end{cases}" },
      { title: "③ より", tex: "a = 1" },
      { title: "① に代入して b+c = -1、② と連立", tex: "b+c = -1,\\quad b - c = 3" },
      { title: "解を求める", tex: "\\therefore\\quad a=1,\\; b=1,\\; c=-2" },
    ],
    // 数値代入法
    [
      { title: "与式に特定の値を代入する", tex: "a(x+1)(x-1)+bx(x+1)+cx(x-1)=3x-1" },
      { title: "x=0 を代入", tex: "a(1)(-1)+0+0 = -1 \\implies -a = -1 \\implies a = 1" },
      { title: "x=1 を代入", tex: "0 + b \\cdot 1 \\cdot 2 + 0 = 2 \\implies 2b = 2 \\implies b = 1" },
      { title: "x=-1 を代入", tex: "0 + 0 + c(-1)(-2) = -4 \\implies 2c = -4 \\implies c = -2" },
      { title: "検算：左辺を整理して 3x-1 になることを確認", tex: "(x^2-1) + (x^2+x) - 2(x^2-x) = 3x - 1 \\quad \\checkmark" },
      { title: "解を求める", tex: "\\therefore\\quad a=1,\\; b=1,\\; c=-2" },
    ]
  ];

  let curMethod = 0, curStep = 0;

  function render() {
    const steps = methods[curMethod];
    const root = document.getElementById('walkthrough');
    let html = '';
    for (let i = 0; i <= curStep; i++) {
      const s = steps[i];
      const cls = i === curStep ? 'current' : '';
      html += `<div class="step ${cls}">
        <div class="label">${s.title}</div>
        <div class="formula-line">${T(s.tex)}</div>
      </div>`;
    }
    root.innerHTML = html;
    tex(String(curStep + 1), document.getElementById('step-cur'));
    tex(String(steps.length), document.getElementById('step-tot'));
    document.getElementById('prev').disabled = curStep === 0;
    document.getElementById('next').disabled = curStep === steps.length - 1;
    const last = root.lastElementChild;
    if (last) last.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }

  function selectMethod(idx) {
    curMethod = idx; curStep = 0;
    document.querySelectorAll('.tab').forEach(t =>
      t.classList.toggle('active', parseInt(t.dataset.idx) === idx)
    );
    render();
  }

  function init() {
    tex("(x+y)(x-y) = x^2 - y^2", document.getElementById('identity-example'), true);
    tex("ax^2 + bx + c = a'x^2 + b'x + c'", document.getElementById('condition-formula'), true);
    document.getElementById('condition-text').innerHTML =
      "この等式が恒等式であるための必要十分条件は：";
    tex("a = a',\\quad b = b',\\quad c = c'", document.getElementById('condition-equiv'), true);
    document.getElementById('note-zero').innerHTML =
      T("P(x) = 0") + " が恒等式 ⟺ " + T("P(x)") + " の各項の係数がすべて " + T("0");
    tex("a(x+1)(x-1) + bx(x+1) + cx(x-1) = 3x - 1", document.getElementById('example-problem'), true);

    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => selectMethod(parseInt(tab.dataset.idx)));
    });
    document.getElementById('prev').addEventListener('click', () => {
      if (curStep > 0) { curStep--; render(); }
    });
    document.getElementById('next').addEventListener('click', () => {
      if (curStep < methods[curMethod].length - 1) { curStep++; render(); }
    });
    render();
  }

  if (window.katex) init();
  else window.addEventListener("DOMContentLoaded", () => {
    if (window.katex) init();
    else { const w = setInterval(() => { if (window.katex) { clearInterval(w); init(); } }, 30); }
  });
</script>
</body>
</html>
