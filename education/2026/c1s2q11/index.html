<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>判別式</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" integrity="sha384-nB0miv6/jRmo5UMMR1wu3Gz6NLsoTkbqJghGIsx//Rlm+ZU03BU6SQNC66uf4l5+" crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" integrity="sha384-7zkQWkzuo3B5mTepMUcHkMB5jZaolc2xDwL6VFqjFALcbeS9Ggm/Yr2r3Dy4lfFg" crossorigin="anonymous"></script>
<style>
  :root { --bg:#fafafa; --fg:#333; --muted:#888; --accent:#2a6df4; }
  * { box-sizing:border-box; }
  html,body { margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Yu Gothic",sans-serif;background:var(--bg);color:var(--fg);line-height:1.7;-webkit-text-size-adjust:100%; }
  main { max-width:800px;margin:0 auto;padding:2.5rem 1.5rem 4rem; }
  h1 { font-size:1.5rem;margin:0 0 .25rem; }
  .subtitle { color:var(--muted);font-size:.9rem;margin:0 0 1.5rem; }
  h2 { font-size:1.1rem;margin:2.25rem 0 .75rem;border-left:4px solid var(--accent);padding-left:.6rem; }
  .card { background:#fff;border:1px solid #e3e3e3;border-radius:10px;padding:1rem 1.25rem;margin:0 0 1rem; }
  .d-grid { display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75rem;margin:.75rem 0; }
  @media(max-width:500px){ .d-grid { grid-template-columns:1fr; } }
  .d-item { border-radius:8px;padding:.75rem 1rem;text-align:center; }
  .d-pos { background:#e8fdf0;border:1.5px solid #4fd47e; }
  .d-zero { background:#fff7e6;border:1.5px solid #f5c842; }
  .d-neg { background:#fde8e8;border:1.5px solid #f54e4e; }
  .d-item .d-label { font-weight:700;font-size:.95rem;margin-bottom:.3rem; }
  .canvas-wrap { display:flex;justify-content:center;margin:1rem 0; }
  #cv-box { position:relative;display:inline-block;width:100%;max-width:500px; }
  canvas { display:block;width:100%;border-radius:10px;border:1px solid #e3e3e3;background:#fff; }
  .cv-lbl { position:absolute;pointer-events:none;line-height:1; }
  .case-btns { display:flex;gap:.5rem;justify-content:center;margin:.75rem 0; }
  .cbtn { flex:1;max-width:160px;padding:.7rem .5rem;border-radius:10px;border:2px solid #d4dbeb;background:#fff;color:var(--accent);font-size:.9rem;font-weight:700;cursor:pointer;font-family:inherit;min-height:48px;transition:all .2s; }
  .cbtn.pos-active { background:#e8fdf0;border-color:#4fd47e;color:#1a9a4e; }
  .cbtn.zero-active { background:#fff7e6;border-color:#f5c842;color:#856404; }
  .cbtn.neg-active { background:#fde8e8;border-color:#f54e4e;color:#b01010; }
  .cbtn:active { transform:scale(.97); }
  .case-desc { text-align:center;min-height:2.5rem;font-size:.95rem;margin:.5rem 0; }
</style>
</head>
<body>
<main>
  <h1>判別式</h1>
  <p class="subtitle" id="sub1"></p>

  <h2>判別式の定義と分類</h2>
  <div class="card">
    <p id="d-def"></p>
    <div class="d-grid">
      <div class="d-item d-pos">
        <div class="d-label" id="d-pos-label"></div>
        <div id="d-pos-desc">2つの異なる実数解</div>
      </div>
      <div class="d-item d-zero">
        <div class="d-label" id="d-zero-label"></div>
        <div id="d-zero-desc">重解（実数）</div>
      </div>
      <div class="d-item d-neg">
        <div class="d-label" id="d-neg-label"></div>
        <div id="d-neg-desc">2つの虚数解（共役）</div>
      </div>
    </div>
  </div>

  <h2>放物線のグラフで確認</h2>
  <div class="case-btns">
    <button class="cbtn pos-active" id="btn-pos" onclick="setCase('pos')"></button>
    <button class="cbtn" id="btn-zero" onclick="setCase('zero')"></button>
    <button class="cbtn" id="btn-neg" onclick="setCase('neg')"></button>
  </div>
  <div class="canvas-wrap">
    <div id="cv-box">
      <canvas id="cv" width="500" height="260"></canvas>
      <span class="cv-lbl" id="lbl-xax" style="color:#aaa"></span>
      <span class="cv-lbl" id="lbl-yax" style="color:#aaa"></span>
      <span class="cv-lbl" id="lbl-r1" style="color:#333;display:none"></span>
      <span class="cv-lbl" id="lbl-r2" style="color:#333;display:none"></span>
      <span class="cv-lbl" id="lbl-r12" style="color:#333;display:none"></span>
    </div>
  </div>
  <div class="case-desc" id="case-desc"></div>
</main>
<script>
  const T=l=>katex.renderToString(l,{throwOnError:false});
  const tex=(l,el)=>katex.render(l,el,{throwOnError:false});

  let currentCase='pos', animFrame=null;
  let lblR1, lblR2, lblR12;

  const cases={
    pos:{ c:-1.5, color:'#2a6df4', descHtml:'' },
    zero:{ c:0,   color:'#f5c842', descHtml:'' },
    neg:{ c:1.5,  color:'#d9534f', descHtml:'' },
  };

  function drawParabola(c, color){
    const cv=document.getElementById('cv');
    const ctx=cv.getContext('2d');
    const W=cv.width, H=cv.height;
    ctx.clearRect(0,0,W,H);
    ctx.strokeStyle='#ddd'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(20,H/2); ctx.lineTo(W-20,H/2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(W/2,10); ctx.lineTo(W/2,H-10); ctx.stroke();
    const scaleX=60, scaleY=55, ox=W/2, oy=H/2;
    ctx.strokeStyle=color; ctx.lineWidth=3;
    ctx.beginPath();
    for(let px=20;px<=W-20;px++){
      const x=(px-ox)/scaleX;
      const yVal=x*x+c;
      const py=oy-yVal*scaleY;
      if(px===20) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.stroke();

    if(c<0){
      const xr=Math.sqrt(-c);
      [[-xr,lblR1],[xr,lblR2]].forEach(([xi,el])=>{
        const px=ox+xi*scaleX;
        ctx.beginPath(); ctx.arc(px,oy,7,0,Math.PI*2);
        ctx.fillStyle=color; ctx.fill();
        el.style.left=(px/W*100).toFixed(1)+'%';
        el.style.top=((oy+14)/H*100).toFixed(1)+'%';
        el.style.transform='translateX(-50%)';
        el.style.display='';
      });
      lblR12.style.display='none';
    } else if(c===0){
      ctx.beginPath(); ctx.arc(ox,oy,7,0,Math.PI*2);
      ctx.fillStyle=color; ctx.fill();
      lblR12.style.left=(ox/W*100).toFixed(1)+'%';
      lblR12.style.top=((oy+14)/H*100).toFixed(1)+'%';
      lblR12.style.transform='translateX(-50%)';
      lblR12.style.display='';
      lblR1.style.display='none'; lblR2.style.display='none';
    } else {
      const py=oy-c*scaleY;
      ctx.beginPath(); ctx.arc(ox,py,5,0,Math.PI*2);
      ctx.fillStyle=color; ctx.fill();
      ctx.setLineDash([4,4]);
      ctx.strokeStyle='#ccc'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(ox,py); ctx.lineTo(ox,oy); ctx.stroke();
      ctx.setLineDash([]);
      lblR1.style.display='none'; lblR2.style.display='none'; lblR12.style.display='none';
    }
  }

  function animateTo(targetCase){
    if(animFrame) cancelAnimationFrame(animFrame);
    const from=cases[currentCase].c, to=cases[targetCase].c, col=cases[targetCase].color;
    const startTime=performance.now(), dur=400;
    function step(now){
      const t=Math.min((now-startTime)/dur,1);
      const ease=t<.5?2*t*t:(1-Math.pow(-2*t+2,2)/2);
      drawParabola(from+(to-from)*ease, col);
      if(t<1) animFrame=requestAnimationFrame(step);
      else { currentCase=targetCase; drawParabola(to,col); }
    }
    animFrame=requestAnimationFrame(step);
  }

  function setCase(key){
    ['pos','zero','neg'].forEach(k=>{
      document.getElementById('btn-'+k).className='cbtn'+(k===key?' '+k+'-active':'');
    });
    document.getElementById('case-desc').innerHTML=cases[key].descHtml;
    animateTo(key);
  }

  function init(){
    lblR1=document.getElementById('lbl-r1');
    lblR2=document.getElementById('lbl-r2');
    lblR12=document.getElementById('lbl-r12');
    lblR1.innerHTML=T('x_1');
    lblR2.innerHTML=T('x_2');
    lblR12.innerHTML=T('x_1=x_2');

    const lx=document.getElementById('lbl-xax');
    lx.innerHTML=T('x');
    lx.style.right='2%';
    lx.style.top='calc(50% - 14px)';

    const ly=document.getElementById('lbl-yax');
    ly.innerHTML=T('y');
    ly.style.left='calc(50% + 5px)';
    ly.style.top='3px';

    document.getElementById('sub1').innerHTML='解の種類は判別式 '+T('D = b^2-4ac')+' で決まる';

    tex('D = b^2-4ac', document.getElementById('d-def'));
    tex('D > 0', document.getElementById('d-pos-label'));
    tex('D = 0', document.getElementById('d-zero-label'));
    tex('D < 0', document.getElementById('d-neg-label'));

    document.getElementById('btn-pos').innerHTML=T('D > 0');
    document.getElementById('btn-zero').innerHTML=T('D = 0');
    document.getElementById('btn-neg').innerHTML=T('D < 0');

    cases.pos.descHtml=T('D > 0')+'：2つの異なる実数解';
    cases.zero.descHtml=T('D = 0')+'：重解（'+T('x')+'軸に接する）';
    cases.neg.descHtml=T('D < 0')+'：実数解なし（虚数解）';

    drawParabola(cases.pos.c, cases.pos.color);
    document.getElementById('case-desc').innerHTML=cases.pos.descHtml;
  }

  if(window.katex) init();
  else document.addEventListener('DOMContentLoaded',()=>{
    if(window.katex) init();
    else { const w=setInterval(()=>{if(window.katex){clearInterval(w);init();}},30); }
  });
</script>
</body>
</html>
