<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>因数定理を利用した高次方程式の解法</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" integrity="sha384-nB0miv6/jRmo5UMMR1wu3Gz6NLsoTkbqJghGIsx//Rlm+ZU03BU6SQNC66uf4l5+" crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" integrity="sha384-7zkQWkzuo3B5mTepMUcHkMB5jZaolc2xDwL6VFqjFALcbeS9Ggm/Yr2r3Dy4lfFg" crossorigin="anonymous"></script>
<style>
  :root { --bg:#fafafa; --fg:#333; --muted:#888; --accent:#2a6df4; }
  * { box-sizing:border-box; }
  html,body { margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Yu Gothic",sans-serif;background:var(--bg);color:var(--fg);line-height:1.7;-webkit-text-size-adjust:100%; }
  main { max-width:800px;margin:0 auto;padding:2.5rem 1.5rem 4rem; }
  h1 { font-size:1.5rem;margin:0 0 .25rem; }
  .subtitle { color:var(--muted);font-size:.9rem;margin:0 0 1.5rem; }
  h2 { font-size:1.1rem;margin:2.25rem 0 .75rem;border-left:4px solid var(--accent);padding-left:.6rem; }
  .card { background:#fff;border:1px solid #e3e3e3;border-radius:10px;padding:1rem 1.25rem;margin:0 0 1rem;overflow-x:auto; }
  .step { opacity:0;transform:translateY(12px);transition:opacity .5s ease, transform .5s ease; }
  .step.show { opacity:1;transform:translateY(0); }
  .highlight { color:var(--accent);font-weight:700; }
  .btn { display:inline-block;padding:.75rem 1.5rem;border-radius:10px;border:2px solid var(--accent);background:#fff;color:var(--accent);font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit;min-height:48px;transition:all .2s;margin:.5rem .25rem; }
  .btn:active { transform:scale(.97); }
  .btn.primary { background:var(--accent);color:#fff; }
  .result-box { background:#e8fdf0;border:2px solid #4fd47e;border-radius:10px;padding:1rem 1.25rem;text-align:center;margin:1rem 0;opacity:0;transform:scale(.95);transition:all .5s ease; }
  .result-box.show { opacity:1;transform:scale(1); }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.03)} }
  .result-box.pulse { animation:pulse .6s ease; }
  .div-table { display:grid;grid-template-columns:auto 1fr;gap:0;margin:.75rem 0;font-size:.95rem; }
  .div-row { display:contents; }
  .div-cell { padding:.25rem .5rem;border-bottom:1px solid #eee; }
  .div-line { border-bottom:2px solid var(--accent); }
  .long-div { background:#f8f9ff;border-radius:8px;padding:1rem;margin:.75rem 0;overflow-x:auto; }
  .long-div .row { display:flex;align-items:center;min-height:1.8rem;gap:.25rem;flex-wrap:nowrap; }
  .long-div .row.indent { padding-left:2rem; }
  .long-div .row.sub { border-top:2px solid var(--fg);display:inline-flex;margin-left:2rem; }
</style>
</head>
<body>
<main>
  <h1>因数定理を利用した高次方程式の解法</h1>
  <p class="subtitle" id="sub1"></p>

  <h2>問題</h2>
  <div class="card">
    <p id="problem"></p>
  </div>

  <h2>解法ステップ</h2>
  <div style="text-align:center;margin-bottom:1rem;">
    <button class="btn primary" id="nextBtn" onclick="nextStep()">ステップを表示</button>
    <button class="btn" onclick="resetSteps()">リセット</button>
  </div>

  <div class="card step" id="s1">
    <p><strong>Step 1:</strong> 因数定理で1次の因数を探す</p>
    <p id="s1a"></p>
    <p id="s1b"></p>
    <p id="s1c"></p>
  </div>

  <div class="card step" id="s2">
    <p><strong>Step 2:</strong> 組立除法（割り算）</p>
    <div class="long-div" id="longdiv"></div>
  </div>

  <div class="card step" id="s3">
    <p><strong>Step 3:</strong> 因数分解の結果</p>
    <p id="s3a"></p>
  </div>

  <div class="card step" id="s4">
    <p><strong>Step 4:</strong> 各因数を解く</p>
    <p id="s4a"></p>
    <p id="s4b"></p>
  </div>

  <div class="result-box" id="result">
    <p id="resultText" style="font-size:1.1rem;margin:0;"></p>
  </div>

  <h2>割り算の視覚化</h2>
  <div class="card">
    <p>多項式の割り算のプロセスを確認しましょう。</p>
    <div style="text-align:center;margin:.5rem 0;">
      <button class="btn primary" id="divBtn" onclick="animateDivision()">割り算を開始</button>
    </div>
    <div id="divAnim" style="position:relative;min-height:280px;overflow-x:auto;">
      <canvas id="cv" width="500" height="280" style="display:block;width:100%;max-width:500px;margin:0 auto;border-radius:10px;border:1px solid #e3e3e3;background:#fff;"></canvas>
      <div id="cv-labels" style="position:relative;width:100%;max-width:500px;margin:0 auto;"></div>
    </div>
  </div>
</main>
<script>
const T=l=>katex.renderToString(l,{throwOnError:false});
const tex=(l,el)=>katex.render(l,el,{throwOnError:false});

let stepIdx=0;
const totalSteps=5;

function nextStep(){
  stepIdx++;
  if(stepIdx>totalSteps) return;
  if(stepIdx<=4){
    const el=document.getElementById('s'+stepIdx);
    el.classList.add('show');
  }
  if(stepIdx===5){
    const r=document.getElementById('result');
    r.classList.add('show');
    setTimeout(()=>r.classList.add('pulse'),100);
  }
  if(stepIdx>=totalSteps){
    document.getElementById('nextBtn').textContent='完了';
  }
}

function resetSteps(){
  stepIdx=0;
  for(let i=1;i<=4;i++) document.getElementById('s'+i).classList.remove('show');
  const r=document.getElementById('result');
  r.classList.remove('show','pulse');
  document.getElementById('nextBtn').textContent='ステップを表示';
  divStep=0;
}

/* Division animation on canvas */
let divStep=0;
function animateDivision(){
  divStep=0;
  runDivStep();
}

function runDivStep(){
  const cv=document.getElementById('cv');
  const ctx=cv.getContext('2d');
  const W=cv.width, H=cv.height;
  ctx.clearRect(0,0,W,H);
  ctx.font='16px -apple-system,sans-serif';
  ctx.textBaseline='top';

  const lines=[];
  lines.push({text:'', katexStr:'x^2+2x+4', x:180, y:10, color:'#2a6df4'});
  lines.push({text:'', katexStr:'x-3', x:50, y:42, color:'#333'});
  lines.push({text:'', katexStr:'x^3 - x^2 - 2x - 12', x:140, y:42, color:'#333'});

  /* Division steps */
  const steps=[
    {katexStr:'x^3 - 3x^2', x:140, y:74, color:'#888', line:true},
    {katexStr:'2x^2 - 2x', x:180, y:110, color:'#333'},
    {katexStr:'2x^2 - 6x', x:180, y:142, color:'#888', line:true},
    {katexStr:'4x - 12', x:220, y:178, color:'#333'},
    {katexStr:'4x - 12', x:220, y:210, color:'#888', line:true},
    {katexStr:'0', x:280, y:246, color:'#4fd47e'},
  ];

  const maxStep=Math.min(divStep, steps.length);

  /* Draw bracket */
  ctx.strokeStyle='#333';
  ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(130,38);
  ctx.lineTo(130,62);
  ctx.lineTo(410,62);
  ctx.stroke();

  /* Draw quotient line */
  ctx.beginPath();
  ctx.moveTo(140,36);
  ctx.lineTo(410,36);
  ctx.stroke();

  /* We render KaTeX as HTML overlays */
  const container=document.getElementById('cv-labels');
  container.innerHTML='';

  function addLabel(katexStr,x,y,color,show){
    if(!show) return;
    const span=document.createElement('span');
    span.style.cssText='position:absolute;pointer-events:none;left:'+x+'px;top:'+y+'px;color:'+color+';font-size:14px;white-space:nowrap;opacity:0;transition:opacity .4s;';
    span.innerHTML=katex.renderToString(katexStr,{throwOnError:false});
    container.appendChild(span);
    requestAnimationFrame(()=>span.style.opacity='1');
  }

  /* Always-visible labels */
  addLabel('x^2+2x+4',180,10,'#2a6df4',true);
  addLabel('x-3',55,42,'#333',true);
  addLabel('x^3 - x^2 - 2x - 12',140,42,'#333',true);

  for(let i=0;i<maxStep;i++){
    const s=steps[i];
    addLabel(s.katexStr,s.x,s.y,s.color,true);
    if(s.line){
      ctx.strokeStyle='#999';
      ctx.lineWidth=1;
      ctx.beginPath();
      ctx.moveTo(s.x-5,s.y+24);
      ctx.lineTo(s.x+160,s.y+24);
      ctx.stroke();
    }
  }

  if(divStep<steps.length){
    divStep++;
    setTimeout(runDivStep,800);
  }
}

function init(){
  document.getElementById('sub1').innerHTML='因数定理を使って3次方程式を解く';
  document.getElementById('problem').innerHTML='方程式 '+T('x^3 - x^2 - 2x - 12 = 0')+' を解け。';

  document.getElementById('s1a').innerHTML=T('P(x) = x^3 - x^2 - 2x - 12')+' とおく。';
  document.getElementById('s1b').innerHTML='定数項 '+T('-12')+' の約数 '+T('\\pm 1, \\pm 2, \\pm 3, \\pm 4, \\pm 6, \\pm 12')+' を代入して試す。';
  document.getElementById('s1c').innerHTML=T('P(3) = 27 - 9 - 6 - 12 = 0')+' '+T('\\checkmark')+' よって '+T('P(x)')+' は '+T('x-3')+' を因数にもつ。';

  /* Long division display */
  const ld=document.getElementById('longdiv');
  ld.innerHTML='<div style="text-align:center;">'+
    T('x^3 - x^2 - 2x - 12')+' を '+T('x - 3')+' で割ると '+T('x^2 + 2x + 4')+
    '</div>';

  document.getElementById('s3a').innerHTML=T('P(x) = (x-3)(x^2 + 2x + 4)');
  document.getElementById('s4a').innerHTML=T('x - 3 = 0')+' より '+T('x = 3');
  document.getElementById('s4b').innerHTML=T('x^2 + 2x + 4 = 0')+' を解の公式で解くと '+T('x = \\dfrac{-2 \\pm \\sqrt{4-16}}{2} = \\dfrac{-2 \\pm 2\\sqrt{3}\\,i}{2} = -1 \\pm \\sqrt{3}\\,i');
  document.getElementById('resultText').innerHTML='答: '+T('x = 3,\\; -1 + \\sqrt{3}\\,i,\\; -1 - \\sqrt{3}\\,i');
}

if(window.katex) init();
else document.addEventListener('DOMContentLoaded',()=>{
  if(window.katex) init();
  else { const w=setInterval(()=>{if(window.katex){clearInterval(w);init();}},30); }
});
</script>
</body>
</html>
