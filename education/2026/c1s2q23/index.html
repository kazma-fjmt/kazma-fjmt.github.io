<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>判別式・解の符号とグラフの関係（課題学習）</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" integrity="sha384-nB0miv6/jRmo5UMMR1wu3Gz6NLsoTkbqJghGIsx//Rlm+ZU03BU6SQNC66uf4l5+" crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" integrity="sha384-7zkQWkzuo3B5mTepMUcHkMB5jZaolc2xDwL6VFqjFALcbeS9Ggm/Yr2r3Dy4lfFg" crossorigin="anonymous"></script>
<style>
  :root { --bg:#fafafa; --fg:#333; --muted:#888; --accent:#2a6df4; }
  * { box-sizing:border-box; }
  html,body { margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Yu Gothic",sans-serif;background:var(--bg);color:var(--fg);line-height:1.7;-webkit-text-size-adjust:100%; }
  main { max-width:800px;margin:0 auto;padding:2.5rem 1.5rem 4rem; }
  h1 { font-size:1.5rem;margin:0 0 .25rem; }
  .subtitle { color:var(--muted);font-size:.9rem;margin:0 0 1.5rem; }
  h2 { font-size:1.1rem;margin:2.25rem 0 .75rem;border-left:4px solid var(--accent);padding-left:.6rem; }
  .card { background:#fff;border:1px solid #e3e3e3;border-radius:10px;padding:1rem 1.25rem;margin:0 0 1rem; }
  .conn-table { width:100%;border-collapse:separate;border-spacing:0;background:#fff;border-radius:10px;border:1px solid #e3e3e3;overflow:hidden; }
  .conn-table th { background:#f0f5ff;padding:.6rem .75rem;font-size:.82rem;text-align:left;border-bottom:1px solid #dce4f0;font-weight:700;color:var(--accent); }
  .conn-table td { padding:.6rem .75rem;font-size:.85rem;border-bottom:1px solid #f0f0f0;vertical-align:middle; }
  .conn-table tr:last-child td { border-bottom:none; }
  .conn-table tr { opacity:0;transform:translateY(6px);transition:opacity .4s,transform .4s; }
  .conn-table tr.show { opacity:1;transform:translateY(0); }
  .badge { display:inline-block;padding:.15rem .5rem;border-radius:4px;font-size:.78rem;font-weight:700; }
  .badge-d { background:#e8fdf0;color:#1a9a4e;border:1px solid #4fd47e; }
  .badge-s { background:#e8f0fd;color:#1a4ea0;border:1px solid #5a8af5; }
  .badge-p { background:#fff7e6;color:#856404;border:1px solid #f5c842; }
  .canvas-wrap { display:flex;justify-content:center;margin:1rem 0; }
  #cv23-box { position:relative;display:inline-block;width:100%;max-width:520px; }
  canvas#cv23 { display:block;width:100%;border-radius:10px;border:1px solid #e3e3e3;background:#fff; }
  .cv-lbl { position:absolute;pointer-events:none;line-height:1; }
  .case-btns { display:flex;gap:.5rem;justify-content:center;margin:.75rem 0;flex-wrap:wrap; }
  .cbtn { padding:.7rem .8rem;border-radius:10px;border:2px solid #d4dbeb;background:#fff;font-size:.85rem;font-weight:700;cursor:pointer;font-family:inherit;min-height:48px;transition:all .2s; }
  .cbtn.active { background:var(--accent);color:#fff;border-color:var(--accent); }
  .cbtn:active { transform:scale(.97); }
  .case-desc { background:#f0f5ff;border-radius:8px;padding:.6rem 1rem;text-align:center;min-height:2.5rem;margin:.5rem 0;font-size:.9rem; }
  .controls-row2 { display:flex;align-items:center;justify-content:center;gap:.75rem;margin:1rem 0; }
  .btn { appearance:none;border:1px solid #d4dbeb;background:#fff;color:var(--accent);font-size:1rem;font-weight:600;padding:.85rem 1.2rem;border-radius:10px;cursor:pointer;min-height:48px;min-width:100px;font-family:inherit;user-select:none; }
  .btn.primary { background:var(--accent);color:#fff;border-color:var(--accent); }
  .btn:disabled { opacity:.3;cursor:not-allowed; }
  .btn:active:not(:disabled) { transform:scale(.97); }
  .reveal-count { color:var(--muted);font-size:.85rem;text-align:center;margin:.25rem 0; }
</style>
</head>
<body>
<main>
  <h1>判別式・解の符号とグラフの関係</h1>
  <p class="subtitle">代数的条件と放物線の幾何学的特徴を結びつける</p>

  <h2 id="h2-cond"></h2>
  <p style="color:var(--muted);font-size:.85rem;margin:.25rem 0 .75rem">「次へ」をタップして順に確認</p>
  <table class="conn-table" id="conn-table">
    <thead>
      <tr class="show">
        <th>代数的条件</th>
        <th>グラフ上の意味</th>
        <th>根拠</th>
      </tr>
    </thead>
    <tbody>
      <tr id="tr1">
        <td><span class="badge badge-d" id="c1a"></span></td>
        <td id="c1b"></td>
        <td style="color:var(--muted);font-size:.78rem" id="c1c"></td>
      </tr>
      <tr id="tr2">
        <td><span class="badge badge-s" id="c2a"></span></td>
        <td id="c2b"></td>
        <td style="color:var(--muted);font-size:.78rem" id="c2c"></td>
      </tr>
      <tr id="tr3">
        <td><span class="badge badge-p" id="c3a"></span></td>
        <td id="c3b"></td>
        <td style="color:var(--muted);font-size:.78rem" id="c3c"></td>
      </tr>
    </tbody>
  </table>
  <div class="controls-row2">
    <button class="btn primary" id="reveal-btn" onclick="revealNext()">次へ ▶</button>
  </div>
  <div class="reveal-count" id="rev-count">0 / 3 表示中</div>

  <h2>アニメーションで確認</h2>
  <p style="color:var(--muted);font-size:.85rem;margin:.25rem 0 .75rem">パターンをタップして切り替える</p>
  <div class="case-btns">
    <button class="cbtn active" id="btn-both-pos" onclick="setScenario('both-pos')">両解正</button>
    <button class="cbtn" id="btn-both-neg" onclick="setScenario('both-neg')">両解負</button>
    <button class="cbtn" id="btn-diff" onclick="setScenario('diff')">異符号</button>
    <button class="cbtn" id="btn-no-real" onclick="setScenario('no-real')">実数解なし</button>
  </div>
  <div class="canvas-wrap">
    <div id="cv23-box">
      <canvas id="cv23" width="520" height="270"></canvas>
      <span class="cv-lbl" id="lbl-xax23" style="color:#aaa"></span>
      <span class="cv-lbl" id="lbl-yax23" style="color:#aaa"></span>
      <span class="cv-lbl" id="lbl-alpha23" style="font-weight:bold;display:none"></span>
      <span class="cv-lbl" id="lbl-beta23" style="font-weight:bold;display:none"></span>
      <span class="cv-lbl" id="lbl-axis23" style="font-size:.75rem"></span>
      <span class="cv-lbl" id="lbl-yint23" style="font-size:.75rem;color:#f5924e"></span>
    </div>
  </div>
  <div class="case-desc" id="anim-desc"></div>
</main>
<script>
  const T=l=>katex.renderToString(l,{throwOnError:false});
  const tex=(l,el)=>katex.render(l,el,{throwOnError:false});

  let revealed=0;
  function revealNext(){
    revealed++;
    if(revealed>=1) document.getElementById('tr1').classList.add('show');
    if(revealed>=2) document.getElementById('tr2').classList.add('show');
    if(revealed>=3){ document.getElementById('tr3').classList.add('show'); document.getElementById('reveal-btn').disabled=true; }
    document.getElementById('rev-count').textContent=revealed+' / 3 表示中';
  }

  let currentScenario='both-pos', animFrame2=null;
  let lblXax, lblYax, lblAlpha, lblBeta, lblAxis, lblYint;

  const scenarios={
    'both-pos':{ a:1, h:1.5, k:-0.5, color:'#2a6df4', descHtml:'' },
    'both-neg':{ a:1, h:-1.5, k:-0.5, color:'#d9534f', descHtml:'' },
    'diff':    { a:1, h:0.5, k:-1.2, color:'#28a745', descHtml:'' },
    'no-real': { a:1, h:0.5, k:0.8,  color:'#888',    descHtml:'' },
  };

  function drawScenario(sc){
    const cv=document.getElementById('cv23');
    const ctx=cv.getContext('2d');
    const W=cv.width, H=cv.height;
    ctx.clearRect(0,0,W,H);
    const ox=W/2, oy=H/2-20;
    const scX=70, scY=55;

    ctx.strokeStyle='#ccc'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(20,oy); ctx.lineTo(W-20,oy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ox,10); ctx.lineTo(ox,H-10); ctx.stroke();

    const {a,h,k,color}=sc;

    ctx.strokeStyle=color; ctx.lineWidth=3;
    ctx.beginPath();
    for(let px=20;px<=W-20;px++){
      const x=(px-ox)/scX;
      const yv=a*(x-h)*(x-h)+k;
      const py=oy-yv*scY;
      if(px===20) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.stroke();

    const vx=ox+h*scX, vy=oy-k*scY;
    ctx.beginPath(); ctx.arc(vx,vy,4,0,Math.PI*2);
    ctx.fillStyle=color; ctx.fill();

    const disc=-k/a;
    if(disc>0){
      const r=Math.sqrt(disc);
      [h-r, h+r].forEach((xi,idx)=>{
        const px=ox+xi*scX;
        ctx.beginPath(); ctx.arc(px,oy,7,0,Math.PI*2);
        ctx.fillStyle=color; ctx.fill();
        const el=idx===0?lblAlpha:lblBeta;
        el.style.color=color;
        el.style.left=(px/W*100).toFixed(1)+'%';
        el.style.top=((oy+14)/H*100).toFixed(1)+'%';
        el.style.transform='translateX(-50%)';
        el.style.display='';
      });
    } else if(disc===0){
      const px=ox+h*scX;
      ctx.beginPath(); ctx.arc(px,oy,7,0,Math.PI*2);
      ctx.fillStyle=color; ctx.fill();
      lblAlpha.style.display='none'; lblBeta.style.display='none';
    } else {
      lblAlpha.style.display='none'; lblBeta.style.display='none';
    }

    ctx.setLineDash([4,4]);
    ctx.strokeStyle=color+'88'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(vx,10); ctx.lineTo(vx,H-10); ctx.stroke();
    ctx.setLineDash([]);
    lblAxis.style.color=color;
    lblAxis.style.left=((vx+4)/W*100).toFixed(1)+'%';
    lblAxis.style.top='3px';

    const yintY=oy-(a*h*h+k)*scY;
    ctx.beginPath(); ctx.arc(ox,yintY,5,0,Math.PI*2);
    ctx.fillStyle='#f5924e'; ctx.fill();
    lblYint.style.left=((ox+6)/W*100).toFixed(1)+'%';
    const yintLblY=Math.max(4,Math.min(H-20,yintY-12));
    lblYint.style.top=(yintLblY/H*100).toFixed(1)+'%';
  }

  function animateTo(key){
    if(animFrame2) cancelAnimationFrame(animFrame2);
    const fromSc=scenarios[currentScenario], sc=scenarios[key];
    const startTime=performance.now(), dur=500;
    function step(now){
      const t=Math.min((now-startTime)/dur,1);
      const ease=t<.5?2*t*t:(1-Math.pow(-2*t+2,2)/2);
      drawScenario({
        a:1,
        h:fromSc.h+(sc.h-fromSc.h)*ease,
        k:fromSc.k+(sc.k-fromSc.k)*ease,
        color:sc.color,
      });
      if(t<1) animFrame2=requestAnimationFrame(step);
      else { currentScenario=key; drawScenario(sc); }
    }
    animFrame2=requestAnimationFrame(step);
  }

  function setScenario(key){
    Object.keys(scenarios).forEach(k=>{
      const b=document.getElementById('btn-'+k);
      if(b) b.classList.toggle('active',k===key);
    });
    document.getElementById('anim-desc').innerHTML=scenarios[key].descHtml;
    animateTo(key);
  }

  function init(){
    lblXax=document.getElementById('lbl-xax23');
    lblYax=document.getElementById('lbl-yax23');
    lblAlpha=document.getElementById('lbl-alpha23');
    lblBeta=document.getElementById('lbl-beta23');
    lblAxis=document.getElementById('lbl-axis23');
    lblYint=document.getElementById('lbl-yint23');

    lblXax.innerHTML=T('x');
    lblXax.style.right='2%';
    lblXax.style.top='calc(42% - 14px)';

    lblYax.innerHTML=T('y');
    lblYax.style.left='calc(50% + 5px)';
    lblYax.style.top='3px';

    lblAlpha.innerHTML=T('\\alpha');
    lblBeta.innerHTML=T('\\beta');
    lblAxis.textContent='軸';
    lblYint.innerHTML=T('y')+'切片';

    document.getElementById('h2-cond').innerHTML=
      T('D > 0')+'，'+T('\\alpha+\\beta > 0')+'，'+T('\\alpha\\beta > 0')+' の幾何学的意味';

    document.getElementById('c1a').innerHTML=T('D > 0');
    document.getElementById('c1b').innerHTML='放物線が'+T('x')+'軸と<strong>2点で交わる</strong>';
    document.getElementById('c1c').innerHTML=T('b^2-4ac > 0')+' → 解の公式で実数値が2つ得られる';

    document.getElementById('c2a').innerHTML=T('\\alpha+\\beta > 0');
    document.getElementById('c2b').innerHTML='対称軸が<strong>原点より右</strong>にある';
    document.getElementById('c2c').innerHTML='軸の位置 = '+T('-\\dfrac{b}{2a} = \\dfrac{\\alpha+\\beta}{2} > 0');

    document.getElementById('c3a').innerHTML=T('\\alpha\\beta > 0');
    document.getElementById('c3b').innerHTML=T('y')+'切片（'+T('x=0')+' の値）が<strong>正</strong>';
    document.getElementById('c3c').innerHTML=T('y')+'切片 = '+T('\\dfrac{c}{a} = \\alpha\\beta > 0');

    scenarios['both-pos'].descHtml=T('D>0')+'（'+T('x')+'軸と2交点），軸は原点右（'+T('\\alpha+\\beta>0')+'），'+T('y')+'切片正（'+T('\\alpha\\beta>0')+'）→ 両解正';
    scenarios['both-neg'].descHtml=T('D>0')+'（'+T('x')+'軸と2交点），軸は原点左（'+T('\\alpha+\\beta<0')+'），'+T('y')+'切片正（'+T('\\alpha\\beta>0')+'）→ 両解負';
    scenarios['diff'].descHtml=T('y')+'切片が負（'+T('\\alpha\\beta<0')+'）→ 自動的に'+T('D>0')+'，解は異符号';
    scenarios['no-real'].descHtml=T('D<0')+'（'+T('x')+'軸と交点なし）→ 実数解なし，複素数解のみ';

    drawScenario(scenarios['both-pos']);
    document.getElementById('anim-desc').innerHTML=scenarios['both-pos'].descHtml;
  }

  if(window.katex) init();
  else document.addEventListener('DOMContentLoaded',()=>{
    if(window.katex) init();
    else { const w=setInterval(()=>{if(window.katex){clearInterval(w);init();}},30); }
  });
</script>
</body>
</html>
