<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>因数定理</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" integrity="sha384-nB0miv6/jRmo5UMMR1wu3Gz6NLsoTkbqJghGIsx//Rlm+ZU03BU6SQNC66uf4l5+" crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" integrity="sha384-7zkQWkzuo3B5mTepMUcHkMB5jZaolc2xDwL6VFqjFALcbeS9Ggm/Yr2r3Dy4lfFg" crossorigin="anonymous"></script>
<style>
  :root {
    --bg: #fafafa;
    --fg: #333;
    --muted: #888;
    --accent: #2a6df4;
    --success: #27ae60;
    --danger: #d9534f;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic", sans-serif;
    background: var(--bg); color: var(--fg);
    line-height: 1.7;
    -webkit-text-size-adjust: 100%;
  }
  main { max-width: 800px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }
  h1 { font-size: 1.5rem; margin: 0 0 .25rem; }
  .subtitle { color: var(--muted); font-size: .9rem; margin: 0 0 1.5rem; }
  h2 {
    font-size: 1.15rem; margin: 2.25rem 0 .75rem;
    border-left: 4px solid var(--accent); padding-left: .6rem;
  }
  p { margin: .75rem 0; }

  .theorem-box {
    background: #eef4ff; border: 2px solid var(--accent);
    border-radius: 12px; padding: 1.25rem 1.5rem; margin: 1rem 0;
    text-align: center;
  }
  .theorem-box .katex { font-size: 1.35rem; }
  .theorem-label {
    font-weight: 700; color: var(--accent); font-size: .95rem; margin-bottom: .5rem;
  }

  .card {
    background: #fff; border: 1px solid #e3e3e3;
    border-radius: 10px; padding: 1rem 1.25rem; margin: .75rem 0;
    overflow-x: auto;
  }

  .step {
    padding: .75rem .25rem; border-bottom: 1px dashed #eee;
    opacity: 0; transform: translateY(12px);
    animation: fadeSlideIn .4s ease forwards;
  }
  .step:last-child { border-bottom: none; }
  .step.current { background: #f0f5ff; border-radius: 8px; padding: .75rem; margin: .25rem -.5rem; border-bottom: none; }
  .step .label { color: var(--muted); font-size: .8rem; margin-bottom: .25rem; }
  .step .formula-line { text-align: left; overflow-x: auto; }
  .step .formula-line .katex { font-size: 1.2rem; }
  .step.current .formula-line .katex { font-size: 1.35rem; }

  @keyframes fadeSlideIn {
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.03); }
  }

  .result-yes { color: var(--success); font-weight: 700; }
  .result-no { color: var(--danger); font-weight: 700; }

  .result-badge {
    display: inline-block; padding: .35rem .8rem; border-radius: 8px;
    font-weight: 700; font-size: .95rem; margin-top: .5rem;
    animation: pulse .5s ease;
  }
  .result-badge.yes { background: #e8f8ef; color: var(--success); }
  .result-badge.no { background: #fde8e8; color: var(--danger); }

  .tabs { display: flex; gap: .5rem; margin: .75rem 0 1rem; flex-wrap: wrap; }
  .tab {
    flex: 1 1 200px; appearance: none; background: #fff;
    border: 1.5px solid #d4dbeb; color: var(--fg);
    border-radius: 10px; padding: 1rem .75rem; font-size: 1rem;
    font-family: inherit; cursor: pointer; min-height: 56px;
    user-select: none; transition: border-color .15s, background .15s;
  }
  .tab.active { border-color: var(--accent); background: #eef4ff; }
  .tab:active { transform: scale(.98); }
  .tab .katex { font-size: 1.15rem; }

  .controls-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: .75rem; margin: 1rem 0 0;
  }
  .btn {
    appearance: none; border: 1px solid #d4dbeb; background: #fff;
    color: var(--accent); font-size: 1rem; font-weight: 600;
    padding: .85rem 1.2rem; border-radius: 10px; cursor: pointer;
    min-height: 48px; min-width: 110px; font-family: inherit; user-select: none;
  }
  .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn:disabled { opacity: .3; cursor: not-allowed; }
  .btn:active:not(:disabled) { transform: scale(.97); }
  .step-counter { color: var(--muted); font-size: .9rem; text-align: center; flex: 1; }
</style>
</head>
<body>
<main>
  <h1>因数定理</h1>
  <p class="subtitle">多項式が特定の因数をもつかどうかを、値の代入で判定します。</p>

  <h2>因数定理</h2>
  <div class="theorem-box">
    <div class="theorem-label">因数定理</div>
    <div id="theorem"></div>
  </div>
  <p>つまり、多項式 <span id="px-inline"></span> に <span id="alpha-inline"></span> を代入して <span id="zero-inline"></span> になれば、<span id="factor-inline"></span> は因数です。</p>

  <h2>例4</h2>
  <p><span id="example-poly"></span> として、<span id="check-desc"></span> を因数にもつか調べましょう。</p>

  <div class="tabs" id="tabs">
    <button class="tab active" data-idx="0"></button>
    <button class="tab" data-idx="1"></button>
  </div>

  <div class="card" id="walkthrough"></div>
  <div class="controls-row">
    <button class="btn" id="prev">&larr; 戻る</button>
    <div class="step-counter">ステップ <span id="step-cur"></span> / <span id="step-tot"></span></div>
    <button class="btn primary" id="next">次へ &rarr;</button>
  </div>
</main>

<script>
  function tex(latex, el, displayMode) {
    katex.render(latex, el, { throwOnError: false, displayMode: !!displayMode });
  }
  function T(l) { return katex.renderToString(l, { throwOnError: false }); }

  const examples = [];
  let curEx = 0, curStep = 0;

  function buildExamples() {
    examples.push({
      label: "x-3",
      steps: [
        { title: "因数定理を確認する", tex: "P(x) \\text{ が } (x - \\alpha) \\text{ を因数にもつ} \\iff P(\\alpha) = 0" },
        { title: "\\alpha = 3 として P(3) を計算する", tex: "P(3) = 3^3 - 3^2 - 7 \\cdot 3 + 3" },
        { title: "各項を計算する", tex: "= 27 - 9 - 21 + 3" },
        { title: "結果", tex: "= 0", badge: "yes", badgeText: "因数をもつ" }
      ]
    });
    examples.push({
      label: "x+3",
      steps: [
        { title: "因数定理を確認する", tex: "P(x) \\text{ が } (x - \\alpha) \\text{ を因数にもつ} \\iff P(\\alpha) = 0" },
        { title: "x+3 = x-(-3) なので \\alpha = -3 として P(-3) を計算する", tex: "P(-3) = (-3)^3 - (-3)^2 - 7 \\cdot (-3) + 3" },
        { title: "各項を計算する", tex: "= -27 - 9 + 21 + 3" },
        { title: "結果", tex: "= -12 \\neq 0", badge: "no", badgeText: "因数をもたない" }
      ]
    });
  }

  function renderWalkthrough() {
    const root = document.getElementById('walkthrough');
    const ex = examples[curEx];
    let html = '';
    for (let i = 0; i <= curStep; i++) {
      const s = ex.steps[i];
      const isCurrent = i === curStep;
      html += '<div class="step ' + (isCurrent ? 'current' : '') + '" style="animation-delay:' + (i * 0.08) + 's">';
      html += '<div class="label">' + T(s.title) + '</div>';
      html += '<div class="formula-line">' + T(s.tex) + '</div>';
      if (s.badge && isCurrent) {
        html += '<div class="result-badge ' + s.badge + '">' + s.badgeText + '</div>';
      }
      html += '</div>';
    }
    root.innerHTML = html;
    tex(String(curStep + 1), document.getElementById('step-cur'));
    tex(String(ex.steps.length), document.getElementById('step-tot'));
    document.getElementById('prev').disabled = curStep === 0;
    document.getElementById('next').disabled = curStep === ex.steps.length - 1;
  }

  function selectExample(idx) {
    curEx = idx; curStep = 0;
    document.querySelectorAll('.tab').forEach(function(t) {
      t.classList.toggle('active', parseInt(t.dataset.idx, 10) === idx);
    });
    renderWalkthrough();
  }

  function init() {
    buildExamples();

    tex("P(x) \\text{ が } (x - \\alpha) \\text{ を因数にもつ} \\iff P(\\alpha) = 0", document.getElementById('theorem'), true);
    tex("P(x)", document.getElementById('px-inline'));
    tex("\\alpha", document.getElementById('alpha-inline'));
    tex("0", document.getElementById('zero-inline'));
    tex("(x - \\alpha)", document.getElementById('factor-inline'));
    tex("P(x) = x^3 - x^2 - 7x + 3", document.getElementById('example-poly'));
    tex("x - 3 \\text{ と } x + 3", document.getElementById('check-desc'));

    document.querySelectorAll('.tab').forEach(function(tab) {
      var idx = parseInt(tab.dataset.idx, 10);
      tex(examples[idx].label, tab);
      tab.addEventListener('click', function() { selectExample(idx); });
    });

    document.getElementById('prev').addEventListener('click', function() {
      if (curStep > 0) { curStep--; renderWalkthrough(); }
    });
    document.getElementById('next').addEventListener('click', function() {
      if (curStep < examples[curEx].steps.length - 1) { curStep++; renderWalkthrough(); }
    });

    renderWalkthrough();
  }

  if (window.katex) init();
  else window.addEventListener("DOMContentLoaded", function() {
    if (window.katex) init();
    else {
      var wait = setInterval(function() {
        if (window.katex) { clearInterval(wait); init(); }
      }, 30);
    }
  });
</script>
</body>
</html>
