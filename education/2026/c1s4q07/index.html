<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>連比と等式の証明</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" integrity="sha384-nB0miv6/jRmo5UMMR1wu3Gz6NLsoTkbqJghGIsx//Rlm+ZU03BU6SQNC66uf4l5+" crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" integrity="sha384-7zkQWkzuo3B5mTepMUcHkMB5jZaolc2xDwL6VFqjFALcbeS9Ggm/Yr2r3Dy4lfFg" crossorigin="anonymous"></script>
<style>
  :root {
    --bg: #fafafa; --fg: #333; --muted: #888; --accent: #2a6df4;
    --c-k: #9b59b6; --c-sub: #e67e22; --c-res: #27ae60;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic", sans-serif;
    background: var(--bg); color: var(--fg); line-height: 1.7; -webkit-text-size-adjust: 100%;
  }
  main { max-width: 800px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }
  h1 { font-size: 1.5rem; margin: 0 0 .25rem; }
  .subtitle { color: var(--muted); font-size: .9rem; margin: 0 0 1.5rem; }
  h2 { font-size: 1.15rem; margin: 2.25rem 0 .75rem; border-left: 4px solid var(--accent); padding-left: .6rem; }
  p { margin: .75rem 0; }

  .definition {
    background: #fff; border: 1px solid #e3e3e3; border-radius: 10px;
    padding: 1rem 1.25rem; margin: .75rem 0; text-align: center;
  }
  .definition .katex { font-size: 1.25rem; }

  .walkthrough {
    background: #fff; border: 1px solid #e3e3e3; border-radius: 10px;
    padding: .75rem 1.25rem; margin: 0 0 .75rem; min-height: 9rem; overflow-x: auto;
  }
  .step {
    padding: .75rem .25rem; border-bottom: 1px dashed #eee;
    opacity: 0; animation: fadeIn .4s ease forwards;
  }
  .step:last-child { border-bottom: none; }
  .step.current { background: #f0f5ff; border-radius: 8px; padding: .75rem; margin: .25rem -.5rem; border-bottom: none; }
  .step .label { color: var(--muted); font-size: .8rem; margin-bottom: .25rem; }
  .step .formula-line { text-align: left; overflow-x: auto; }
  .step .formula-line .katex { font-size: 1.2rem; }
  .step.current .formula-line .katex { font-size: 1.35rem; }

  .controls-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: .75rem; margin: 1rem 0 0;
  }
  .btn {
    appearance: none; border: 1px solid #d4dbeb; background: #fff;
    color: var(--accent); font-size: 1rem; font-weight: 600;
    padding: .85rem 1.2rem; border-radius: 10px; cursor: pointer;
    min-height: 48px; min-width: 110px; font-family: inherit; user-select: none;
  }
  .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn:disabled { opacity: .3; cursor: not-allowed; }
  .btn:active:not(:disabled) { transform: scale(.97); }
  .step-counter { color: var(--muted); font-size: .9rem; text-align: center; flex: 1; }

  .legend {
    display: flex; justify-content: center; gap: 1.5rem; flex-wrap: wrap;
    font-size: .85rem; color: var(--muted); margin-top: .5rem;
  }
  .legend .swatch {
    display: inline-block; width: .75rem; height: .75rem;
    border-radius: 50%; margin-right: .35rem; vertical-align: middle;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<main>
  <h1>連比と等式の証明</h1>
  <p class="subtitle">連比の定義と、比の値を文字でおいて証明する方法を学びましょう。</p>

  <h2>連比とは</h2>
  <div class="definition" id="def-ratio"></div>
  <p>のとき、これを <span id="inline-ratio"></span> と書き、<strong>連比</strong>といいます。</p>

  <h2>例題6：連比の証明</h2>
  <div class="definition" id="problem-statement"></div>
  <div class="legend">
    <span><span class="swatch" style="background:#9b59b6;"></span>比の値 <span id="lbl-k"></span></span>
    <span><span class="swatch" style="background:#e67e22;"></span>代入</span>
    <span><span class="swatch" style="background:#27ae60;"></span>結果</span>
  </div>

  <p class="subtitle">「次へ」をタップして、1ステップずつ証明を追いましょう。</p>

  <div class="walkthrough" id="walkthrough"></div>
  <div class="controls-row">
    <button class="btn" id="prev">← 戻る</button>
    <div class="step-counter">ステップ <span id="step-cur"></span> / <span id="step-tot"></span></div>
    <button class="btn primary" id="next">次へ →</button>
  </div>
</main>

<script>
  const C_K = "#9b59b6";
  const C_SUB = "#e67e22";
  const C_RES = "#27ae60";

  function tex(latex, target, displayMode = false) {
    katex.render(latex, target, { throwOnError: false, displayMode });
  }
  function T(l) {
    return katex.renderToString(l, { throwOnError: false, displayMode: false });
  }

  const steps = [
    {
      title: "条件を確認する",
      tex: `x : y : z = 4 : 3 : 2`
    },
    {
      title: "比の値を k とおく",
      tex: `\\frac{x}{4} = \\frac{y}{3} = \\frac{z}{2} = \\textcolor{${C_K}}{k} \\quad (\\textcolor{${C_K}}{k} \\neq 0)`
    },
    {
      title: "x, y, z を k で表す",
      tex: `x = 4\\textcolor{${C_K}}{k}, \\quad y = 3\\textcolor{${C_K}}{k}, \\quad z = 2\\textcolor{${C_K}}{k}`
    },
    {
      title: "各式に代入する",
      tex: `x + 2y = \\textcolor{${C_SUB}}{4k + 6k} = \\textcolor{${C_RES}}{10k}`
    },
    {
      title: "2番目の式",
      tex: `2x - y = \\textcolor{${C_SUB}}{8k - 3k} = \\textcolor{${C_RES}}{5k}`
    },
    {
      title: "3番目の式",
      tex: `5z = \\textcolor{${C_SUB}}{5 \\cdot 2k} = \\textcolor{${C_RES}}{10k}`
    },
    {
      title: "比を求める",
      tex: `(x+2y):(2x-y):5z = \\textcolor{${C_RES}}{10k}:\\textcolor{${C_RES}}{5k}:\\textcolor{${C_RES}}{10k}`
    },
    {
      title: "k で割って整理",
      tex: `= \\textcolor{${C_RES}}{2 : 1 : 2}`
    }
  ];

  let curStep = 0;

  function renderWalkthrough() {
    const root = document.getElementById('walkthrough');
    let html = '';
    for (let i = 0; i <= curStep; i++) {
      const s = steps[i];
      const isCurrent = i === curStep;
      html += `<div class="step ${isCurrent ? 'current' : ''}" style="animation-delay:${isCurrent ? '0.05s' : '0s'}">
        <div class="label">${s.title}</div>
        <div class="formula-line">${T(s.tex)}</div>
      </div>`;
    }
    root.innerHTML = html;
    tex(String(curStep + 1), document.getElementById('step-cur'));
    tex(String(steps.length), document.getElementById('step-tot'));
    document.getElementById('prev').disabled = curStep === 0;
    document.getElementById('next').disabled = curStep === steps.length - 1;
  }

  function init() {
    tex(`\\frac{a}{a'} = \\frac{b}{b'} = \\frac{c}{c'}`, document.getElementById('def-ratio'), true);
    tex(`a:b:c = a':b':c'`, document.getElementById('inline-ratio'));
    tex(`x:y:z = 4:3:2 \\text{ のとき、} (x+2y):(2x-y):5z = 2:1:2 \\text{ を証明せよ。}`, document.getElementById('problem-statement'));
    tex(`\\textcolor{${C_K}}{k}`, document.getElementById('lbl-k'));

    document.getElementById('prev').addEventListener('click', () => {
      if (curStep > 0) { curStep--; renderWalkthrough(); }
    });
    document.getElementById('next').addEventListener('click', () => {
      if (curStep < steps.length - 1) { curStep++; renderWalkthrough(); }
    });

    renderWalkthrough();
  }

  if (window.katex) init();
  else window.addEventListener("DOMContentLoaded", () => {
    if (window.katex) init();
    else { const w = setInterval(() => { if (window.katex) { clearInterval(w); init(); } }, 30); }
  });
</script>
</body>
</html>
